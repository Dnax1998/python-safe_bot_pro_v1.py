<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Muzyka - NeoRun</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        .btn-back { background: #333; color: white; padding: 10px 20px; text-decoration: none; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        
        .setup-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 80%; background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--neon); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .player-container { width: 100%; border-radius: 12px; overflow: hidden; background: #282828; min-height: 352px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        iframe { border-radius: 12px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← POWRÓT</a>

    <div class="setup-box" id="setup">
        <small style="color: #888;">WKLEJ LINK DO PLAYLISTY SPOTIFY:</small><br><br>
        <input type="text" id="playlistLink" placeholder="https://open.spotify.com/playlist/...">
        <button class="btn-save" onclick="updatePlaylist()">USTAW</button>
    </div>

    <div class="player-container" id="player-wrapper">
        <p style="padding: 50px; color: #555;">Wklej link powyżej, aby załadować swoją muzykę.</p>
    </div>

    <script>
        // Ładowanie zapisanej playlisty
        window.onload = () => {
            const saved = localStorage.getItem('neoPlaylist');
            if(saved) {
                loadIframe(saved);
                document.getElementById('setup').style.display = 'none'; // Ukryj ustawienia, jeśli już ustawione
            }
        };

        function updatePlaylist() {
            let link = document.getElementById('playlistLink').value;
            if(link.includes('spotify.com')) {
                // Zamiana linku na wersję embed
                let embedLink = link.replace('spotify.com/', 'spotify.com/embed/');
                localStorage.setItem('neoPlaylist', embedLink);
                loadIframe(embedLink);
                document.getElementById('setup').style.display = 'none';
            } else {
                alert("To nie jest poprawny link do Spotify!");
            }
        }

        function loadIframe(url) {
            document.getElementById('player-wrapper').innerHTML = `
                <iframe src="${url}" 
                    width="100%" height="352" 
                    frameborder="0" allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    loading="lazy">
                </iframe>
                <button onclick="showSetup()" style="background:none; border:none; color:#444; font-size:10px; margin-top:10px; cursor:pointer;">Zmień playlistę</button>
            `;
        }

        function showSetup() {
            document.getElementById('setup').style.display = 'block';
        }
    </script>
</body>
</html>
