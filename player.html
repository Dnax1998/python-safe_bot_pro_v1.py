<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzyka - NeoRun</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .player-card { background: #1a1a1a; padding: 40px 20px; border-radius: 30px; border: 1px solid #333; margin-top: 50px; }
        .disc { width: 120px; height: 120px; background: #333; border-radius: 50%; margin: 0 auto 30px; border: 5px solid var(--neon); display: flex; align-items: center; justify-content: center; font-size: 40px; animation: rotate 5s linear infinite; animation-play-state: paused; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-play { background: var(--neon); width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="color:white; text-decoration:none;">← POWRÓT</a>
    <div class="player-card">
        <div class="disc" id="disc">🎵</div>
        <button class="btn-play" id="playBtn">▶</button>
        <p style="margin-top:20px; color:#666;">Włącz Spotify w tle i steruj tutaj</p>
    </div>
    <script>
        const btn = document.getElementById('playBtn');
        const disc = document.getElementById('disc');
        let playing = false;
        btn.onclick = () => {
            playing = !playing;
            btn.innerText = playing ? '⏸' : '▶';
            disc.style.animationPlayState = playing ? 'running' : 'paused';
        };
    </script>
</body>
</html>
