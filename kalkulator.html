<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaawansowany Kalkulator Kredytowy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --text: #1e293b; --border: #cbd5e1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; }
        .flex-input { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { width: 100px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); }
        select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; margin-top: 5px; }

        .res-main { text-align: center; margin-bottom: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; }
        .res-main h2 { margin: 0; color: var(--primary); font-size: 1.8rem; }

        .table-container { max-height: 500px; overflow-y: auto; margin-top: 20px; border: 1px solid var(--border); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        th { position: sticky; top: 0; background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; }
        tr:nth-child(even) { background: #f1f5f9; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 20px;">
        <h1>Ekspercki Kalkulator Hipoteczny</h1>
    </header>

    <div class="grid">
        <div class="card">
            <div class="input-group">
                <label>Kwota Kredytu (PLN)</label>
                <div class="flex-input">
                    <input type="number" id="num_amount" value="300000" oninput="sync('amount', this.value)">
                    <input type="range" id="rng_amount" min="10000" max="2000000" step="5000" value="300000" oninput="sync('amount', this.value)">
                </div>
            </div>

            <div class="input-group">
                <label>Okres (Lata)</label>
                <div class="flex-input">
                    <input type="number" id="num_years" value="25" oninput="sync('years', this.value)">
                    <input type="range" id="rng_years" min="1" max="35" value="25" oninput="sync('years', this.value)">
                </div>
            </div>

            <div class="input-group">
                <label>Oprocentowanie / RRSO (%)</label>
                <div class="flex-input">
                    <input type="number" id="num_rate" value="7.5" step="0.1" oninput="sync('rate', this.value)">
                    <input type="range" id="rng_rate" min="0.1" max="15" step="0.1" value="7.5" oninput="sync('rate', this.value)">
                </div>
            </div>

            <hr>

            <div class="input-group">
                <label>Typ nadpłaty</label>
                <select id="overpayment_type" onchange="calculate()">
                    <option value="monthly">Miesięczna (regularna)</option>
                    <option value="once">Jednorazowa</option>
                </select>
            </div>

            <div class="input-group">
                <label id="label_overpayment">Kwota nadpłaty (PLN)</label>
                <div class="flex-input">
                    <input type="number" id="num_extra" value="0" oninput="sync('extra', this.value)">
                    <input type="range" id="rng_extra" min="0" max="20000" step="100" value="0" oninput="sync('extra', this.value)">
                </div>
            </div>

            <div class="input-group">
                <label>Miesiąc startu nadpłaty</label>
                <input type="number" id="start_month" value="1" min="1" style="width: 100%;" oninput="calculate()">
            </div>
        </div>

        <div class="card">
            <div class="res-main">
                <label>Prognozowana Rata:</label>
                <h2 id="display_installment">0.00 PLN</h2>
                <div id="savings_badge" style="margin-top:10px;"></div>
            </div>
            
            <div style="height: 350px;">
                <canvas id="loanChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Pełny Harmonogram Spłat</h3>
        <div class="table-container">
            <table id="schedule_table">
                <thead>
                    <tr>
                        <th>Nr</th>
                        <th>Rata Suma</th>
                        <th>Kapitał</th>
                        <th>Odsetki</th>
                        <th>Nadpłata</th>
                        <th>Pozostało</th>
                    </tr>
                </thead>
                <tbody id="schedule_body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    function sync(id, val) {
        document.getElementById('num_' + id).value = val;
        document.getElementById('rng_' + id).value = val;
        calculate();
    }

    function format(n) {
        return n.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' zł';
    }

    function calculate() {
        const amount = parseFloat(document.getElementById('num_amount').value) || 0;
        const years = parseInt(document.getElementById('num_years').value) || 0;
        const rate = (parseFloat(document.getElementById('num_rate').value) || 0) / 100 / 12;
        const extra = parseFloat(document.getElementById('num_extra').value) || 0;
        const type = document.getElementById('overpayment_type').value;
        const startM = parseInt(document.getElementById('start_month').value) || 1;
        const totalMonths = years * 12;

        if (amount <= 0 || years <= 0) return;

        // Rata stała
        const factor = Math.pow(1 + rate, totalMonths);
        const installment = (amount * factor * rate) / (factor - 1);
        document.getElementById('display_installment').innerText = format(installment);

        let balance = amount;
        let scheduleHtml = '';
        let chartData = [amount];
        let chartLabels = [0];
        let month = 1;
        let savedInterest = 0;

        while (balance > 0 && month <= 600) { // Limit 50 lat
            let interest = balance * rate;
            let principal = installment - interest;
            
            // Logika nadpłaty
            let currentExtra = 0;
            if (month >= startM) {
                if (type === 'monthly') {
                    currentExtra = extra;
                } else if (type === 'once' && month === startM) {
                    currentExtra = extra;
                }
            }

            let totalPrincipal = principal + currentExtra;
            
            if (totalPrincipal > balance) {
                totalPrincipal = balance;
                currentExtra = Math.max(0, totalPrincipal - principal);
            }

            balance -= totalPrincipal;
            if (balance < 0) balance = 0;

            chartData.push(balance);
            chartLabels.push(month);

            // Budowanie tabeli
            scheduleHtml += `<tr>
                <td>${month}</td>
                <td>${format(interest + principal + currentExtra)}</td>
                <td>${format(principal)}</td>
                <td>${format(interest)}</td>
                <td style="color:green; font-weight:bold">${currentExtra > 0 ? '+ ' + format(currentExtra) : '-'}</td>
                <td>${format(balance)}</td>
            </tr>`;

            if (balance <= 0) break;
            month++;
        }

        document.getElementById('schedule_body').innerHTML = scheduleHtml;
        
        // Aktualizacja info o oszczędności czasu
        const savedMonths = totalMonths - month;
        const badge = document.getElementById('savings_badge');
        if (savedMonths > 0) {
            badge.innerHTML = `<span style="background:#dcfce7; color:#166534; padding:5px 15px; border-radius:20px; font-weight:bold; font-size:0.9rem;">
                Szybsza spłata o ${savedMonths} miesięcy (${(savedMonths/12).toFixed(1)} lat)!
            </span>`;
        } else {
            badge.innerHTML = "";
        }

        renderChart(chartLabels, chartData);
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('loanChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Pozostały kapitał',
                    data: data,
                    borderColor: '#2563eb',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    fill: true,
                    pointRadius: 0,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Miesiąc' }, ticks: { maxTicksLimit: 20 } },
                    y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() + ' zł' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // Start
    calculate();
</script>

</body>
</html>
