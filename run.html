<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bieg - NeoRun</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #00ff88; --dark: #000; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .stats { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .val { font-size: 5rem; font-weight: bold; color: var(--neon); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .unit { font-size: 1.2rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .controls { padding: 40px; display: flex; justify-content: center; background: #0a0a0a; border-top: 1px solid #222; }
        .btn-stop { 
            width: 80px; height: 80px; border-radius: 50%; background: #ff4444; border: none;
            color: white; font-weight: bold; font-size: 1rem; box-shadow: 0 0 20px rgba(255,68,68,0.3);
        }
    </style>
</head>
<body>
    <div class="stats">
        <div class="unit">Dystans</div>
        <div id="dist" class="val">0.00</div>
        <div class="unit">Kilometrów</div>
    </div>
    <div class="controls">
        <button class="btn-stop" onclick="stopRun()">STOP</button>
    </div>

    <script>
        let distance = 0;
        // Symulacja biegu (zastąp to logiką GPS jeśli chcesz)
        const timer = setInterval(() => {
            distance += 0.01;
            document.getElementById('dist').innerText = distance.toFixed(2);
        }, 1000);

        function stopRun() {
            clearInterval(timer);
            const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
            history.push({ dist: distance.toFixed(2), date: new Date().toLocaleDateString() });
            localStorage.setItem('neoHistory', JSON.stringify(history));
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
