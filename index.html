<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Amateur League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AMATOR LEAGUE CS2</h1>
        <nav>
            <button onclick="showTab('table')">Tabela</button>
            <button onclick="showTab('matches')">Terminarz</button>
        </nav>
    </header>

    <main>
        <section id="table" class="tab-content">
            <h2>Tabela Ligowa</h2>
            <table>
                <thead>
                    <tr>
                        <th>Poz.</th>
                        <th>Drużyna</th>
                        <th>Mecze</th>
                        <th>Pkt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td>GamerZone</td><td>5</td><td>15</td></tr>
                    <tr><td>2</td><td>FragMasters</td><td>5</td><td>12</td></tr>
                    <tr><td>3</td><td>NoobSquad</td><td>5</td><td>9</td></tr>
                </tbody>
            </table>
        </section>

        <section id="matches" class="tab-content" style="display:none;">
            <h2>Najbliższe Mecze</h2>
            <div class="match-card">
                <span>GamerZone vs FragMasters</span>
                <small>Piątek, 20:00</small>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
