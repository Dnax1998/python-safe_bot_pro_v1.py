<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Motivation Tracker</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        .muscle-wrapper {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .muscle-wrapper img {
            max-height: 100vh;
            max-width: 100vw;
            object-fit: contain;
            display: block;
        }

        /* DYSKRETNE HOTSPOTY - tylko lekka poświata po najechaniu */
        .hotspot {
            position: absolute;
            width: 8%; /* Dostosuj wielkość punktu */
            height: 8%;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.4s;
            z-index: 10;
            background: rgba(255, 255, 255, 0); /* Niewidoczne na starcie */
        }

        .hotspot:hover {
            background: rgba(255, 100, 0, 0.3); /* Pojawia się poświata przy najechaniu */
            box-shadow: 0 0 20px #ff4500;
        }

        .hotspot.trained {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid gold;
            box-shadow: 0 0 10px gold;
        }

        /* Modal - Gamingowy styl */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(30, 30, 30, 0.95);
            padding: 30px; border-radius: 10px; text-align: center;
            border: 1px solid #ff4500; z-index: 100; color: white;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
        }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 4px; border: 1px solid #555; background: #000; color: white; text-align: center;}
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="muscle-wrapper">
        <img src="zdjecie.jpg" alt="Mapa mięśni">

        <div id="Barki-hotspot" class="hotspot" style="top: 25%; left: 45%;" onclick="openModal('Barki')"></div>
        <div id="Klatka-hotspot" class="hotspot" style="top: 35%; left: 40%;" onclick="openModal('Klatka')"></div>
        <div id="Uda-hotspot" class="hotspot" style="top: 60%; left: 40%;" onclick="openModal('Uda')"></div>
    </div>

    <div id="modal">
        <h3 id="modal-title">Mięsień</h3>
        <input type="number" id="weight" placeholder="Waga (kg)">
        <br>
        <button onclick="saveData()">ZAPISZ</button>
        <button style="background:transparent; border:1px solid #555; margin-left: 10px;" onclick="closeModal()">ANULUJ</button>
    </div>

    <script>
        let currentMuscle = "";

        window.onload = function() {
            ['Barki', 'Klatka', 'Uda'].forEach(m => {
                if (localStorage.getItem(m)) {
                    document.getElementById(m + '-hotspot').classList.add('trained');
                }
            });
        }

        function openModal(name) {
            currentMuscle = name;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('weight').value = localStorage.getItem(name) || "";
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                localStorage.setItem(currentMuscle, w);
                document.getElementById(currentMuscle + '-hotspot').classList.add('trained');
                closeModal();
            }
        }
    </script>
</body>
</html>
