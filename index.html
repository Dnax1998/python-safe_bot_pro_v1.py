<style>
    /* ... reszta Twoich stylów bez zmian ... */

    :root {
        --header-blue: #216694;
        /* Nowa, intensywna czerwień */
        --vivid-red: #d62828; 
        --vivid-red-gradient: linear-gradient(135deg, #d62828 0%, #b31919 100%);
        --content-width: 80%;
    }

    /* BANER HERO - INTENSYWNY I ZAOKRĄGLONY */
    .hero-container {
        width: var(--content-width);
        margin: 40px auto;
        /* Mocne zaokrąglenie rogów */
        border-radius: 20px; 
        overflow: hidden;
        /* Subtelny cień dla głębi */
        box-shadow: 0 10px 30px rgba(214, 40, 40, 0.2);
    }

    .hero {
        background: var(--vivid-red-gradient);
        padding: 60px 50px;
        color: white;
        text-align: center;
        position: relative;
    }

    .hero h1 {
        font-size: 38px;
        margin-bottom: 25px;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .phone-row {
        font-size: 22px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center; /* Wyśrodkowanie numerów */
        gap: 15px;
    }

    .phone-row strong {
        font-size: 30px;
        background: rgba(255,255,255,0.15);
        padding: 2px 10px;
        border-radius: 8px;
    }

    .hero-btn {
        background: white;
        color: var(--vivid-red);
        border: none;
        padding: 14px 35px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 50px; /* Przycisk typu "pigułka" */
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .hero-btn:hover {
        transform: scale(1.05);
        background: #f8f9fa;
    }

    /* ... reszta Twoich stylów ... */
</style>

<div class="hero-container">
    <header class="hero">
        <h1>Bezpłatne Telefony Zaufania</h1>
        <div class="phones">
            <div class="phone-row">
                <i class="fa-solid fa-phone-flip"></i>
                <strong>116 111</strong> <span>Telefon dla Dzieci i Młodzieży</span>
            </div>
            <div class="phone-row">
                <i class="fa-solid fa-headset"></i>
                <strong>800 70 222</strong> <span>Linia Wsparcia dla Dorosłych</span>
            </div>
        </div>
        <button class="hero-btn">
            Więcej informacji <i class="fa-solid fa-arrow-right" style="margin-left:10px"></i>
        </button>
    </header>
</div>
