<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Motivation Fullscreen</title>
    <style>
        /* Resetujemy wszystko, żeby nie było marginesów */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* Blokuje przewijanie */
        }

        /* Kontener zajmuje 100% szerokości i wysokości ekranu */
        .full-screen-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Zdjęcie wypełnia kontener w 100% */
        .full-screen-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* KLUCZOWE: Wypełnia ekran, nawet jeśli trzeba lekko przyciąć krawędzie */
            display: block;
        }

        /* Hotspoty - teraz będą działać względem całego ekranu */
        .hotspot {
            position: absolute;
            width: 50px; /* Stały rozmiar punktu */
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            background: rgba(255, 69, 0, 0); /* Niewidoczne */
            transition: 0.3s;
        }

        .hotspot:hover {
            background: rgba(255, 69, 0, 0.4);
            box-shadow: 0 0 20px #ff4500;
        }

        .hotspot.trained {
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid gold;
        }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #222;
            padding: 30px; border-radius: 15px; text-align: center;
            border: 2px solid #ff4500; z-index: 100; color: white;
        }
        input { padding: 12px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <img src="zdjecie.jpg" alt="Mapa mięśni">

        <div id="Barki-hotspot" class="hotspot" style="top: 25%; left: 45%;" onclick="openModal('Barki')"></div>
        <div id="Klatka-hotspot" class="hotspot" style="top: 35%; left: 40%;" onclick="openModal('Klatka')"></div>
        <div id="Uda-hotspot" class="hotspot" style="top: 60%; left: 40%;" onclick="openModal('Uda')"></div>
    </div>

    <div id="modal">
        <h3 id="modal-title">Mięsień</h3>
        <input type="number" id="weight" placeholder="Wpisz ciężar (kg)">
        <br>
        <button onclick="saveData()">Zapisz</button>
    </div>

    <script>
        let currentMuscle = "";

        // Funkcja wczytująca zapisane dane
        window.onload = function() {
            ['Barki', 'Klatka', 'Uda'].forEach(m => {
                if (localStorage.getItem(m)) {
                    document.getElementById(m + '-hotspot').classList.add('trained');
                }
            });
        }

        function openModal(name) {
            currentMuscle = name;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('weight').value = localStorage.getItem(name) || "";
        }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                localStorage.setItem(currentMuscle, w);
                document.getElementById(currentMuscle + '-hotspot').classList.add('trained');
                document.getElementById('modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
