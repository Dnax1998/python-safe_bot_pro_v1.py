<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoRun</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00ff88">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3112/3112933.png">
    
    <style>
        :root { --neon: #00ff88; --dark: #000; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .hero { padding: 50px 20px; background: linear-gradient(to bottom, #111, #000); }
        h1 { color: var(--neon); letter-spacing: 5px; font-size: 3rem; margin: 0; }
        .menu { display: grid; gap: 20px; padding: 20px; }
        .nav-btn { 
            background: #1a1a1a; color: white; padding: 20px; border-radius: 20px; 
            text-decoration: none; border: 1px solid #333; font-weight: bold; font-size: 1.2rem;
            transition: 0.3s;
        }
        .nav-btn:active { transform: scale(0.95); border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>NEORUN</h1>
        <p style="color: #666;">EVOLUTION SYSTEM</p>
    </div>
    <div class="menu">
        <a href="#" class="nav-btn" style="border-color: var(--neon); color: var(--neon); font-size: 1.5rem;">START RUN</a>
        <a href="achievements.html" class="nav-btn">EQUIPMENT (EVO)</a>
        <a href="player.html" class="nav-btn">MUSIC PLAYER</a>
    </div>

    <script>
        // Rejestracja Service Workera dla trybu Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('NeoRun Offline Ready'))
                    .catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
