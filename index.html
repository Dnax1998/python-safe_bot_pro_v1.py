<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Motivation Tracker</title>
    <style>
        body { 
            background: #111; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px; 
        }

        h1 { margin-bottom: 5px; color: #ff4500; }
        p { margin-bottom: 20px; color: #ccc; }

        .muscle-wrapper { position: relative; max-width: 800px; width: 100%; }
        .muscle-wrapper img { width: 100%; height: auto; border-radius: 15px; display: block; }

        /* Hotspoty */
        .hotspot {
            position: absolute; width: 6%; height: 8%;
            background: rgba(255, 69, 0, 0.3); border-radius: 50%;
            cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .hotspot:hover { background: rgba(255, 69, 0, 0.7); transform: scale(1.2); }
        
        /* Styl dla trenowanego mięśnia (złoty) */
        .hotspot.trained { background: rgba(255, 215, 0, 0.6); border-color: gold; box-shadow: 0 0 15px gold; }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #222;
            padding: 30px; border-radius: 15px; text-align: center;
            border: 2px solid #ff4500; z-index: 100;
        }
        input { padding: 12px; width: 80%; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Twój Trening</h1>
    <p>Kliknij w mięsień, aby dodać/zaktualizować wynik:</p>

    <div class="muscle-wrapper">
        <img src="zdjecie.jpg" alt="Mapa mięśni">

        <div id="Barki-hotspot" class="hotspot" style="top: 25%; left: 45%;" onclick="openModal('Barki')"></div>
        <div id="Klatka-hotspot" class="hotspot" style="top: 35%; left: 40%;" onclick="openModal('Klatka')"></div>
        <div id="Uda-hotspot" class="hotspot" style="top: 60%; left: 40%;" onclick="openModal('Uda')"></div>
    </div>

    <div id="modal">
        <h3 id="modal-title">Mięsień</h3>
        <input type="number" id="weight" placeholder="Wpisz ciężar (kg)">
        <br>
        <button onclick="saveData()">Zapisz wynik</button>
        <button style="background:#555; margin-left: 10px;" onclick="closeModal()">Anuluj</button>
    </div>

    <script>
        let currentMuscle = "";

        // Przy ładowaniu strony - sprawdź zapisane dane
        window.onload = function() {
            const muscles = ['Barki', 'Klatka', 'Uda'];
            muscles.forEach(m => {
                if (localStorage.getItem(m)) {
                    document.getElementById(m + '-hotspot').classList.add('trained');
                }
            });
        }

        function openModal(name) {
            currentMuscle = name;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('weight').value = localStorage.getItem(name) || "";
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                // Zapisz do przeglądarki
                localStorage.setItem(currentMuscle, w);
                
                // Zmień kolor na złoty
                document.getElementById(currentMuscle + '-hotspot').classList.add('trained');
                
                alert("Wynik dla " + currentMuscle + " zapisany: " + w + " kg!");
                closeModal();
            }
        }
    </script>
</body>
</html>
