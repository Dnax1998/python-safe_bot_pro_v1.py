<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoRun</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00ff88">
    <style>
        :root { --neon: #00ff88; --dark: #000; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .hero { padding: 40px 20px; background: linear-gradient(to bottom, #111, #000); }
        h1 { color: var(--neon); letter-spacing: 5px; font-size: 2.5rem; margin: 0; }
        .menu { display: grid; gap: 15px; padding: 20px; grid-template-columns: 1fr 1fr; }
        .nav-btn { 
            background: #111; color: white; padding: 20px 10px; border-radius: 20px; 
            text-decoration: none; border: 1px solid #222; font-weight: bold; font-size: 0.9rem;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-btn.main { grid-column: span 2; border-color: var(--neon); color: var(--neon); font-size: 1.4rem; padding: 30px; }
        .nav-btn:active { transform: scale(0.95); background: #1a1a1a; }
        .icon { font-size: 1.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>NEORUN</h1>
        <p style="color: #666; font-size: 0.8rem;">SYSTEM EWOLUCJI V1.0</p>
    </div>
    <div class="menu">
        <a href="run.html" class="nav-btn main"><span class="icon">🏃‍♂️</span>START RUN</a>
        <a href="achievements.html" class="nav-btn"><span class="icon">🛡️</span>GABLOTA</a>
        <a href="history.html" class="nav-btn"><span class="icon">📜</span>HISTORIA</a>
        <a href="player.html" class="nav-btn"><span class="icon">🎵</span>MUZYKA</a>
        <a href="profile.html" class="nav-btn"><span class="icon">👤</span>PROFIL</a>
        <a href="shop.html" class="nav-btn"><span class="icon">🛒</span>SKLEP</a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
