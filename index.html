<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker SVG Model</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; font-family: sans-serif; overflow: hidden; color: white; }

        /* Kontener główny - centrowanie ludzika */
        .wrapper {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); /* Efekt głębi */
        }

        /* NAGŁÓWEK NA GÓRZE */
        .header { position: absolute; top: 30px; text-align: center; }
        .header h1 { margin: 0; color: #ff4500; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        .header p { margin: 5px 0; color: #aaa; }

        /* STYLIZACJA LUDZIKA SVG */
        svg {
            max-height: 80vh; max-width: 90vw;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.2)); /* Delikatna poświata całego ludzika */
        }

        /* Klasa dla każdego mięśnia (path w SVG) */
        .muscle {
            fill: #333; /* Domyślny, ciemny kolor mięśnia */
            stroke: #555; /* Kolor obramowania */
            stroke-width: 1px;
            cursor: pointer;
            transition: 0.3s; /* Gładkie przejście koloru */
        }

        /* Efekt po najechaniu myszką */
        .muscle:hover {
            fill: #ff4500; /* Jasny pomarańczowy */
            filter: drop-shadow(0 0 10px #ff4500); /* Mocna poświata */
        }

        /* Styl dla mięśnia "trenowanego" - np. po zapisaniu wyniku */
        .muscle.trained {
            fill: rgba(255, 215, 0, 0.7); /* Złoty */
            stroke: gold;
            filter: drop-shadow(0 0 15px gold);
        }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.95);
            padding: 30px; border-radius: 12px; text-align: center;
            border: 2px solid #ff4500; z-index: 100;
            box-shadow: 0 0 40px rgba(255, 69, 0, 0.4);
        }
        input { padding: 12px; width: 80%; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: white; text-align: center;}
        button { background: #ff4500; color: white; padding: 12px 24px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">
            <h1>Twój Trening</h1>
            <p>Kliknij w mięsień, aby dodać wynik</p>
        </div>

        <svg viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M200,50 L250,80 L250,150 L300,180 L280,350 L220,400 L250,600 L200,750 L150,600 L180,400 L120,350 L100,180 L150,150 L150,80 Z" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
            
            <path id="Bark-L" class="muscle" d="M110,180 C100,200 100,230 110,250 L140,230 L140,200 Z" onclick="openModal('Bark Lewy')"/>
            <path id="Bark-P" class="muscle" d="M290,180 C300,200 300,230 290,250 L260,230 L260,200 Z" onclick="openModal('Bark Prawy')"/>
            
            <path id="Klatka" class="muscle" d="M150,190 L250,190 L240,280 L160,280 Z" onclick="openModal('Klatka Piersiowa')"/>
            
            <path id="Biceps-L" class="muscle" d="M90,260 C80,280 80,310 90,330 L110,320 L110,270 Z" onclick="openModal('Biceps Lewy')"/>
            <path id="Biceps-P" class="muscle" d="M310,260 C320,280 320,310 310,330 L290,320 L290,270 Z" onclick="openModal('Biceps Prawy')"/>

            <path id="Brzuch" class="muscle" d="M170,290 L230,290 L220,380 L180,380 Z" onclick="openModal('Mięśnie Brzucha')"/>

            <path id="Udo-L" class="muscle" d="M160,420 L200,420 L190,580 L150,560 Z" onclick="openModal('Udo Lewe')"/>
            <path id="Udo-P" class="muscle" d="M240,420 L200,420 L210,580 L250,560 Z" onclick="openModal('Udo Prawe')"/>
        </svg>
    </div>

    <div id="modal">
        <h3 id="modal-title">Mięsień</h3>
        <input type="number" id="weight" placeholder="Waga (kg)">
        <br>
        <button onclick="saveData()">Zapisz</button>
        <button style="background:transparent; border:1px solid #555; margin-left:10px" onclick="closeModal()">Anuluj</button>
    </div>

    <script>
        let currentMuscleId = ""; // Przechowujemy ID <path>, a nie nazwę
        let currentMuscleName = "";

        // Wczytaj dane przy starcie
        window.onload = function() {
            document.querySelectorAll('.muscle').forEach(path => {
                if (localStorage.getItem(path.id)) {
                    path.classList.add('trained');
                }
            });
        }

        function openModal(name) {
            // Znajdź ID elementu SVG, który wywołał tę nazwę
            // (W pełnym modelu zrobilibyśmy to mapą, tu upraszczam)
            currentMuscleName = name;
            // Szukamy po ID w SVG - muszę ręcznie dopasować w tym uproszczeniu
            if(name === 'Klatka Piersiowa') currentMuscleId = 'Klatka';
            if(name.includes('Bark')) currentMuscleId = name.includes('Lewy') ? 'Bark-L' : 'Bark-P';
            if(name.includes('Biceps')) currentMuscleId = name.includes('Lewy') ? 'Biceps-L' : 'Biceps-P';
            if(name === 'Mięśnie Brzucha') currentMuscleId = 'Brzuch';
            if(name.includes('Udo')) currentMuscleId = name.includes('Lewy') ? 'Udo-L' : 'Udo-P';

            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('weight').value = localStorage.getItem(currentMuscleId) || "";
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                // Zapisz do pamięci przeglądarki używając unikalnego ID
                localStorage.setItem(currentMuscleId, w);
                
                // Zmień kolor bezpośrednio na elemencie SVG
                const musclePath = document.getElementById(currentMuscleId);
                if (musclePath) {
                    musclePath.classList.add('trained');
                }
                
                closeModal();
            }
        }
    </script>
</body>
</html>
