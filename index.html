<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }

        /* KONTENER GŁÓWNY: Twoja grafika jako tło */
        .gym-container {
            width: 100vw;
            height: 100vh;
            background-image: url('zdjecie.jpg'); /* Upewnij się, że plik nazywa się zdjecie.jpg */
            background-size: contain;   /* Zdjęcie zachowuje proporcje i mieści się na ekranie */
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Niewidoczne punkty klikalne */
        .muscle-zone {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            /* Zmień te wartości, aby dopasować do swoich mięśni */
            border-radius: 50%;
        }

        /* Efekt po najechaniu - lekka poświata */
        .muscle-zone:hover {
            background: rgba(255, 69, 0, 0.2);
            box-shadow: 0 0 15px #ff4500;
        }

        /* Styl dla odblokowanego mięśnia */
        .muscle-zone.trained {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid gold;
        }

        /* MODAL */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #1a1a1a;
            padding: 30px; border-radius: 12px; border: 1px solid #ff4500;
            color: white; z-index: 100; text-align: center;
        }
        input { padding: 10px; width: 200px; display: block; margin: 10px auto; background: #333; border: 1px solid #555; color: white; }
        button { background: #ff4500; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="gym-container">
        <div class="muscle-zone" style="top: 65%; left: 42%; width: 10%; height: 15%;" onclick="openModal('Uda')"></div>
        <div class="muscle-zone" style="top: 25%; left: 45%; width: 10%; height: 10%;" onclick="openModal('Barki')"></div>
    </div>

    <div id="modal">
        <h3 id="modal-title">Mięsień</h3>
        <input type="number" id="weight" placeholder="Waga (kg)">
        <button onclick="saveData()">ZAPISZ WYNIK</button>
    </div>

    <script>
        let currentMuscle = "";

        function openModal(name) {
            currentMuscle = name;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
        }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                localStorage.setItem(currentMuscle, w);
                alert("Zapisano: " + w + "kg");
                document.getElementById('modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
