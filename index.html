<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoRun - Dashboard</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Header & XP Bar */
        .profile-section { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .xp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #level-tag { background: var(--neon); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .xp-bar-bg { background: #333; height: 12px; border-radius: 10px; overflow: hidden; }
        #xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1.5s; box-shadow: 0 0 10px var(--neon); }

        /* Main Grid Menu */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .menu-item { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-decoration: none; color: white; text-align: center; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--neon); }
        .menu-item i { font-size: 30px; display: block; margin-bottom: 10px; }
        .menu-item span { font-size: 14px; font-weight: bold; text-transform: uppercase; color: #aaa; }
        .menu-item.main { grid-column: span 2; background: var(--neon); color: black; border: none; }
        .menu-item.main span { color: black; font-size: 18px; }

        /* Stats Row */
        .stats-row { display: flex; justify-content: space-around; margin: 20px 0; background: #111; padding: 15px; border-radius: 15px; }
        .stat-box { text-align: center; }
        .stat-box small { color: #666; display: block; font-size: 10px; }
        .stat-box b { color: var(--neon); font-size: 18px; }
    </style>
</head>
<body>

    <div class="profile-section">
        <div class="xp-header">
            <span style="font-weight: bold;">TWÓJ POZIOM</span>
            <span id="level-tag">POZIOM 1</span>
        </div>
        <div class="xp-bar-bg"><div id="xp-fill"></div></div>
        <p id="xp-text" style="font-size: 12px; color: #888; margin-top: 8px;">0 / 1000 XP do następnego poziomu</p>
    </div>

    <div class="stats-row">
        <div class="stat-box"><small>DYSTANS</small><b id="stat-dist">0.00</b></div>
        <div class="stat-box"><small>BIEGI</small><b id="stat-runs">0</b></div>
        <div class="stat-box"><small>SERIA</small><b id="stat-streak">0</b></div>
    </div>

    <div class="grid-menu">
        <a href="run.html" class="menu-item main">
            <i>🏃‍♂️</i><span>Zacznij Trening</span>
        </a>
        <a href="history.html" class="menu-item">
            <i>📜</i><span>Historia</span>
        </a>
        <a href="profile.html" class="menu-item">
            <i>👤</i><span>Profil (1)</span>
        </a>
        <a href="player.html" class="menu-item">
            <i>🎵</i><span>Muzyka (2)</span>
        </a>
        <a href="calendar.html" class="menu-item">
            <i>📅</i><span>Kalendarz (3)</span>
        </a>
        <a href="shop.html" class="menu-item">
            <i>🛒</i><span>Sklep XP (6)</span>
        </a>
        <a href="challenges.html" class="menu-item">
            <i>🏆</i><span>Wyzwania (7)</span>
        </a>
        <a href="achievements.html" class="menu-item">
            <i>🏅</i><span>Odznaki</span>
        </a>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
        let totalDist = 0;
        history.forEach(r => totalDist += parseFloat(r.dist));

        // Obliczanie XP i Poziomu
        const totalXP = Math.floor(totalDist * 100);
        const level = Math.floor(totalXP / 1000) + 1;
        const currentLevelXP = totalXP % 1000;

        // Aktualizacja UI
        document.getElementById('level-tag').innerText = `POZIOM ${level}`;
        document.getElementById('xp-fill').style.width = (currentLevelXP / 10) + "%";
        document.getElementById('xp-text').innerText = `${currentLevelXP} / 1000 XP do poziomu ${level + 1}`;
        document.getElementById('stat-dist').innerText = totalDist.toFixed(2);
        document.getElementById('stat-runs').innerText = history.length;
    </script>
</body>
</html>
