<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gym Motivation Pro</title>
    <style>
        /* Reset i tło */
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Kontener główny - tutaj wstawiamy Twoje zdjęcie */
        .app-container {
            width: 100vw;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Strefy klikalne (Hotspoty) */
        .muscle-zone {
            position: absolute;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 5;
            background: rgba(255, 255, 255, 0); /* Niewidoczne standardowo */
        }

        /* Efekt najechania myszką (Glow) */
        .muscle-zone:hover {
            background: rgba(255, 100, 0, 0.2);
            box-shadow: 0 0 20px #ff4500;
        }

        /* Stan "trenowany" */
        .muscle-zone.trained {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px gold;
        }

        /* MODAL (Panel zapisu) */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 25, 0.9);
            padding: 30px;
            border: 1px solid #ff4500;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            z-index: 100;
            min-width: 300px;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: white; border-radius: 5px; }
        button { background: #ff4500; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="muscle-zone" style="top: 25%; left: 45%; width: 8%; height: 10%;" onclick="openModal('Barki')"></div>
        <div class="muscle-zone" style="top: 35%; left: 40%; width: 10%; height: 15%;" onclick="openModal('Klatka')"></div>
        <div class="muscle-zone" style="top: 60%; left: 40%; width: 10%; height: 20%;" onclick="openModal('Uda')"></div>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title" style="color: #ff4500; margin-top: 0;">Mięsień</h2>
        <input type="number" id="weight" placeholder="Ciężar (kg)">
        <input type="number" id="reps" placeholder="Powtórzenia">
        <button onclick="saveData()">ZAPISZ I PODNIEŚ RANGĘ</button>
    </div>

    <script>
        let currentMuscle = "";

        function openModal(name) {
            currentMuscle = name;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal').style.display = 'block';
        }

        function saveData() {
            const w = document.getElementById('weight').value;
            if(w) {
                localStorage.setItem(currentMuscle, w);
                alert("Wynik dla " + currentMuscle + " zapisany!");
                document.getElementById('modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
