<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gym Tracker - NAPRAWIONY</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; /* Kolor zastępczy */ overflow: hidden; }

        .app-container {
            width: 100vw; height: 100vh;
            /* TUTAJ WKLEJ DOKŁADNĄ NAZWĘ SWOJEGO PLIKU */
            background-image: url('background.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            background-color: #0a0a0a; /* To widać, jeśli zdjęcie nie zadziała */
        }

        .muscle-hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            /* WIDOCZNOŚĆ: Zostawiłem lekkie czerwone tło, żebyś widział, gdzie klikasz */
            background: rgba(255, 0, 0, 0.3); 
            transition: 0.3s;
        }

        .muscle-hotspot:hover { background: rgba(255, 255, 255, 0.4); }

        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #222;
            padding: 20px; border-radius: 10px; border: 1px solid #ff4500;
            color: white; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="muscle-hotspot" style="top: 30%; left: 45%; width: 10%; height: 10%;" onclick="alert('Działa!')"></div>
    </div>

    <div id="modal">
        <h3>Wynik</h3>
        <button onclick="document.getElementById('modal').style.display='none'">Zamknij</button>
    </div>
</body>
</html>
