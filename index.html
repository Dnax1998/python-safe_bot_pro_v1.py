<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Amateur League | Sezon 1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">CS2 AMATOR <span>LEAGUE</span></div>
        <nav>
            <button class="nav-btn active" onclick="showTab('home')"><i class="fas fa-home"></i> Start</button>
            <button class="nav-btn" onclick="showTab('table')"><i class="fas fa-trophy"></i> Tabela</button>
            <button class="nav-btn" onclick="showTab('matches')"><i class="fas fa-gamepad"></i> Mecze</button>
            <button class="nav-btn" onclick="showTab('register')"><i class="fas fa-user-plus"></i> Zapisy</button>
            <button class="nav-btn" onclick="showTab('rules')"><i class="fas fa-book"></i> Regulamin</button>
        </nav>
    </header>

    <main>
        <section id="home" class="tab-content">
            <div class="hero">
                <h2>Witaj w amatorskich rozgrywkach CS2</h2>
                <p class="subtitle">10 zespołów w lidze | System awans/spadek | Sezon 2026</p>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-sitemap"></i>
                        <div class="stat-info">
                            <h3>2</h3>
                            <p>Dywizje</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="stat-info">
                            <h3>20</h3>
                            <p>Drużyn</p>
                        </div>
                    </div>
                    <div class="stat-card live">
                        <i class="fas fa-broadcast-tower"></i>
                        <div class="stat-info">
                            <h3>LIVE</h3>
                            <p>Status</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        </main>

    <script src="script.js"></script>
</body>
</html>
