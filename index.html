<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gym Level Tracker</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #333; padding: 20px; border-radius: 15px; width: 300px; }
        .body-map { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .muscle { background: #444; padding: 20px; text-align: center; cursor: pointer; border-radius: 10px; border: 2px solid transparent; }
        .muscle:hover { border-color: #ff4500; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background: #ff4500; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        #result { margin-top: 20px; font-weight: bold; color: #ff4500; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Twój Profil</h2>
        <input type="number" id="weight" placeholder="Twoja waga (kg)">
        
        <h3>Wybierz partię:</h3>
        <div class="body-map">
            <div class="muscle" onclick="selectMuscle('Klatka', 1.2)">Klatka</div>
            <div class="muscle" onclick="selectMuscle('Plecy', 1.3)">Plecy</div>
            <div class="muscle" onclick="selectMuscle('Nogi', 1.5)">Nogi</div>
            <div class="muscle" onclick="selectMuscle('Biceps', 0.8)">Biceps</div>
        </div>

        <div id="input-section" style="display:none;">
            <h3 id="muscle-name">Partia</h3>
            <input type="number" id="lift-weight" placeholder="Ciężar w kg">
            <button onclick="calculateLevel()">Oblicz Rangę</button>
        </div>

        <div id="result"></div>
    </div>

<script>
    let selectedMuscle = '';
    let multiplier = 0;

    function selectMuscle(name, mult) {
        selectedMuscle = name;
        multiplier = mult;
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('muscle-name').innerText = name;
    }

    function calculateLevel() {
        const userWeight = document.getElementById('weight').value;
        const liftWeight = document.getElementById('lift-weight').value;
        
        if (!userWeight || !liftWeight) return alert("Wpisz obie wartości!");

        // Logika obliczeń: (Ciężar / Waga ciała) * Mnożnik partii
        const score = (liftWeight / userWeight) * multiplier * 10;
        let rank = "";

        if (score < 5) rank = "Nowicjusz (Level 1)";
        else if (score < 10) rank = "Amator (Level 2)";
        else if (score < 15) rank = "Wojownik (Level 3)";
        else rank = "Legenda (Level 4)";

        document.getElementById('result').innerText = `Wynik: ${score.toFixed(1)} pkt. Ranga: ${rank}`;
    }
</script>

</body>
</html>
