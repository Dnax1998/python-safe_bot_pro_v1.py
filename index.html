<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trener Mocy</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        
        /* Kontener na zdjęcie */
        .image-container { position: relative; width: fit-content; }
        
        /* Twoje zdjęcie */
        img { display: block; border-radius: 10px; max-width: 500px; }

        /* Niewidzialne strefy (musisz dostosować ich pozycję w CSS!) */
        .muscle-zone {
            position: absolute;
            background: rgba(255, 69, 0, 0); /* Przezroczyste */
            cursor: pointer;
            transition: 0.3s;
            border-radius: 50%;
        }
        .muscle-zone:hover {
            background: rgba(255, 69, 0, 0.4); /* Podświetlenie przy najechaniu */
            box-shadow: 0 0 15px #ff4500;
        }

        /* Modal */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; border-radius: 10px; z-index: 10; text-align: center; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #ff4500; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="image-container">
    <img src="zdjecie.jpg" alt="Mapa mięśni">

    <div class="muscle-zone" style="top: 20%; left: 40%; width: 50px; height: 50px;" onclick="openModal('Klatka')"></div>
    <div class="muscle-zone" style="top: 50%; left: 35%; width: 60px; height: 80px;" onclick="openModal('Uda')"></div>
</div>

<div id="modal" class="modal">
    <h3 id="m-name">Mięsień</h3>
    <input type="number" id="weight" placeholder="Ciężar (kg)">
    <button onclick="saveResult()">Zapisz</button>
</div>

<script>
    let activeMuscle = "";
    function openModal(name) { activeMuscle = name; document.getElementById('modal').style.display = 'block'; document.getElementById('m-name').innerText = name; }
    function saveResult() { 
        alert("Zapisano wynik dla: " + activeMuscle); 
        document.getElementById('modal').style.display = 'none'; 
    }
</script>

</body>
</html>
