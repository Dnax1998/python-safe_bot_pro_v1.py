<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoRunner - Twój Tracker</title>
    <link rel="stylesheet" href="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.css](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; }
        #stats { background: #222; color: white; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .stat-box { border-bottom: 1px solid #444; padding-bottom: 5px; }
        .label { font-size: 0.8rem; color: #aaa; display: block; }
        .value { font-size: 1.2rem; font-weight: bold; }
        #controls { background: #222; padding: 10px; text-align: center; }
        button { background: #0px; cursor: pointer; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

    <div id="stats">
        <div class="stat-box"><span class="label">Dystans</span><span id="dist" class="value">0.00</span> km</div>
        <div class="stat-box"><span class="label">Tempo</span><span id="pace" class="value">0:00</span> min/km</div>
        <div class="stat-box"><span class="label">Czas</span><span id="time" class="value">00:00</span></div>
        <div class="stat-box"><span class="label">Dokładność</span><span id="acc" class="value">-</span> m</div>
    </div>

    <div id="map"></div>

    <div id="controls">
        <button id="startBtn">START BIEGU</button>
    </div>

    <script src="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.js](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
    <script>
        let map, path, watchId;
        let coords = [];
        let totalDistance = 0;
        let startTime, timerInterval;

        // Inicjalizacja mapy
        map = L.map('map').setView([0, 0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        path = L.polyline([], {color: '#00ff88', weight: 5}).addTo(map);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Promień Ziemi w km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) *                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateStats(position) {
            const { latitude, longitude, accuracy } = position.coords;
            const newPoint = [latitude, longitude];
            
            document.getElementById('acc').innerText = Math.round(accuracy);

            if (coords.length > 0) {
                const lastPoint = coords[coords.length - 1];
                const d = calculateDistance(lastPoint[0], lastPoint[1], latitude, longitude);
                
                // Ignoruj skoki GPS powyżej 30m jeśli dokładność jest słaba
                if (accuracy < 30) {
                    totalDistance += d;
                    document.getElementById('dist').innerText = totalDistance.toFixed(2);
                }
            }

            coords.push(newPoint);
            path.setLatLngs(coords);
            map.panTo(newPoint);

            // Oblicz tempo
            const now = new Date();
            const elapsedMins = (now - startTime) / 60000;
            if (totalDistance > 0.01) {
                const pace = elapsedMins / totalDistance;
                const paceMins = Math.floor(pace);
                const paceSecs = Math.round((pace - paceMins) * 60);
                document.getElementById('pace').innerText = `${paceMins}:${paceSecs.toString().padStart(2, '0')}`;
            }
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            if (!watchId) {
                this.innerText = "STOP";
                this.style.background = "#ff4444";
                startTime = new Date();
                
                // Timer
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((new Date() - startTime) / 1000);
                    const m = Math.floor(elapsed / 60);
                    const s = elapsed % 60;
                    document.getElementById('time').innerText = `${m}:${s.toString().padStart(2, '0')}`;
                }, 1000);

                // GPS
                watchId = navigator.geolocation.watchPosition(updateStats, 
                    (err) => console.error(err), 
                    { enableHighAccuracy: true, distanceFilter: 5 }
                );
            } else {
                location.reload(); // Prosty reset aplikacji
            }
        });
    </script>
</body>
</html>
