<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC DEX</title>

<style>
body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:linear-gradient(180deg,#0b1020,#131a35);
    color:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo{
    font-size:32px;
    font-weight:800;
    color:#f3ba2f;
}

.wallet{
    padding:14px 22px;
    border:none;
    border-radius:16px;
    background:#f3ba2f;
    font-weight:bold;
    cursor:pointer;
}

.card{
    max-width:520px;
    margin:30px auto;
    padding:24px;
    border-radius:24px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(15px);
}

.box{
    background:#1b233d;
    padding:18px;
    border-radius:18px;
    margin:12px 0;
}

.token{
    font-size:18px;
    margin-bottom:10px;
}

input{
    width:100%;
    background:transparent;
    border:none;
    color:white;
    font-size:28px;
}

input:focus{
    outline:none;
}

.switch{
    text-align:center;
    font-size:30px;
    margin:10px 0;
}

button.swap{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#f3ba2f;
    font-weight:bold;
    cursor:pointer;
    font-size:18px;
}

.stats{
    max-width:900px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.stat{
    background:rgba(255,255,255,.06);
    padding:15px;
    border-radius:18px;
    text-align:center;
}

.port{
    max-width:900px;
    margin:20px auto;
    background:rgba(255,255,255,.06);
    padding:20px;
    border-radius:18px;
}

.asset{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
}

@media(max-width:700px){
    .stats{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">BSC DEX</div>
    <button class="wallet">Connect Wallet</button>
</header>

<div class="card">

    <h2>Swap</h2>

    <div class="box">
        <div class="token">🟡 BNB</div>
        <input id="from" placeholder="0.0">
    </div>

    <div class="switch">⇅</div>

    <div class="box">
        <div class="token">🟢 USDT</div>
        <input id="to" placeholder="0.0" readonly>
    </div>

    <button class="swap" onclick="swap()">
        Swap Now
    </button>

</div>

<div class="stats">

    <div class="stat">
        <h3>TVL</h3>
        <p>$12.4M</p>
    </div>

    <div class="stat">
        <h3>Volume</h3>
        <p>$2.1M</p>
    </div>

    <div class="stat">
        <h3>Pairs</h3>
        <p>245</p>
    </div>

    <div class="stat">
        <h3>Users</h3>
        <p>14520</p>
    </div>

</div>

<div class="port">

    <h2>Portfolio</h2>

    <div class="asset">
        <span>BNB</span>
        <span>2.45</span>
    </div>

    <div class="asset">
        <span>USDT</span>
        <span>1240</span>
    </div>

    <div class="asset">
        <span>USDC</span>
        <span>320</span>
    </div>

</div>

<script>
function swap() {

    let v =
    parseFloat(
        document.getElementById('from').value
    ) || 0;

    document.getElementById('to').value =
    (v * 0.98).toFixed(4);
}
</script>

</body>
</html>
