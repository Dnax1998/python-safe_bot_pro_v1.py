<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITRO GYM - System Rang PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090e16;
            --panel: #111827;
            --input: #0d121d;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --neon-primary: #00f2fe; /* Cyan */
            --neon-secondary: #ff0055; /* Magenta */
            --neon-success: #00ff88; /* Green */
            --shadow-panel: 0 15px 35px rgba(0, 0, 0, 0.7);
            --border-panel: 1px solid rgba(0, 242, 254, 0.15);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 10% 10%, rgba(255, 0, 85, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 242, 254, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 850px) {
            .app-container { grid-template-columns: 1fr; }
        }

        /* --- STYLIZACJA PANELI --- */
        .panel {
            background-color: var(--panel);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-panel);
            border: var(--border-panel);
            position: relative;
            overflow: hidden;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
        }

        h2.title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            margin: 0 0 30px 0;
            font-size: 1.4rem;
            text-shadow: 0 0 10px var(--neon-primary);
        }

        /* --- FORMY WEJŚCIOWE PRO --- */
        .input-group { margin-bottom: 18px; position: relative; }
        label { 
            display: block; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--neon-primary); 
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        input[type="number"] {
            width: 100%;
            background-color: var(--input);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 18px;
            border-radius: 8px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--neon-primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4), inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .input-unit {
            position: absolute;
            right: 18px;
            top: 36px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        /* --- WIZUALIZACJA PRAWA (LUDZIK + RANGA) --- */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        #avatar-container {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #avatar-svg {
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.3));
        }

        /* Stylizacja części ciała SVG */
        .body-part { fill: rgba(255, 255, 255, 0.05); stroke: rgba(255,255,255,0.2); stroke-width: 1; transition: all 0.3s ease; }
        .body-part.active { stroke: var(--neon-success); stroke-width: 1.5; fill: rgba(0, 255, 136, 0.08); filter: drop-shadow(0 0 5px var(--neon-success)); }
        .core-part { fill: var(--panel); stroke: var(--text-muted); }

        /* --- EKLEKTRONICZNA ODZNAKA RANGI --- */
        .rank-display-box {
            margin-top: -20px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .rank-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, white 30%, var(--neon-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.6));
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .performance-bar {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.03);
        }

        #perf-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-secondary), var(--neon-primary));
            box-shadow: 0 0 10px var(--neon-primary);
            transition: width 0.5s ease-out;
        }

        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron', sans-serif; color: var(--neon-success); font-weight: 700; }

        /* --- TABELA RANKINGOWA --- */
        .ranking-box { margin-top: 25px; width: 100%; }
        .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .ranking-table th { text-align: left; color: var(--neon-secondary); padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; }
        .ranking-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.02); color: var(--text-main); }
        
        .ranking-table tr.user-row {
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.1), transparent);
            font-weight: 700;
            color: white;
        }
        .ranking-table tr.user-row td { border-bottom: 1px solid rgba(0, 242, 254, 0.3); }
        .ranking-table tr.user-row td:first-child { border-left: 3px solid var(--neon-primary); }

    </style>
</head>
<body>

<div class="app-container">
    <!-- KOLUMNA LEWA: WPROWADZANIE DANYCH -->
    <div class="panel data-panel">
        <h2 class="title">Biometria</h2>
        <div class="input-group">
            <label>Masa Ciała</label>
            <input type="number" id="userWeight" placeholder="0" oninput="updateSystem()">
            <span class="input-unit">KG</span>
        </div>
        
        <h2 class="title" style="margin-top:40px;">Protokół Siłowy</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>Klatka (BP)</label>
                <input type="number" id="chest" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
            <div class="input-group">
                <label>Plecy (DL)</label>
                <input type="number" id="back" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
            <div class="input-group">
                <label>Barki (OHP)</label>
                <input type="number" id="shoulders" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
            <div class="input-group">
                <label>Nogi (SQ)</label>
                <input type="number" id="legs" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
            <div class="input-group">
                <label>Ramiona (Curls)</label>
                <input type="number" id="biceps" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
            <div class="input-group">
                <label>Triceps (Dips)</label>
                <input type="number" id="triceps" placeholder="0" oninput="updateSystem()">
                <span class="input-unit">KG</span>
            </div>
        </div>

        <div class="ranking-box">
            <label>Ranking Sieciowy (Kat. <span id="weight-cat-label">0</span>kg)</label>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Kryptonim</th>
                        <th>Ratio</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <!-- Generowane przez JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- KOLUMNA PRAWA: WIZUALIZACJA SYSTEMU -->
    <div class="panel visual-panel">
        <h2 class="title">Wizualizacja Statystyk</h2>
        
        <div id="avatar-container">
            <!-- Futurystyczny Manekin SVG -->
            <svg id="avatar-svg" viewBox="0 0 100 160">
                <!-- Głowa/Rdzeń -->
                <circle class="core-part" cx="50" cy="20" r="12" />
                <circle cx="50" cy="20" r="4" fill="var(--neon-primary)" />
                
                <!-- Klatka Piersiowa -->
                <path id="part-chest" class="body-part" d="M35 35 H65 L70 65 H30 Z" />
                
                <!-- Barki -->
                <circle id="part-shoulder-l" class="body-part" cx="28" cy="40" r="6" />
                <circle id="part-shoulder-r" class="body-part" cx="72" cy="40" r="6" />
                
                <!-- Ramiona (Biceps/Triceps area) -->
                <rect id="part-arm-l" class="body-part" x="20" y="50" width="10" height="35" rx="5" />
                <rect id="part-arm-r" class="body-part" x="70" y="50" width="10" height="35" rx="5" />
                
                <!-- Nogi -->
                <path id="part-leg-l" class="body-part" d="M35 75 H48 V130 H32 Z" />
                <path id="part-leg-r" class="body-part" d="M52 75 H65 L68 130 H52 Z" />
                
                <!-- Połączenia ("Kości") -->
                <line x1="50" y1="32" x2="50" y2="75" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
            </svg>
        </div>

        <div class="rank-display-box">
            <div id="rank-name" class="rank-name">INICJACJA</div>
            <div class="stat-label">Całkowity Współczynnik Siły: <span id="avg-ratio" class="stat-value">0.00</span>x</div>
            
            <div class="performance-bar">
                <div id="perf-fill"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-muted);">
                <span>MIN</span>
                <span>MAX SIŁY (3.0x)</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 10 Rang PRO
    const ranks = [
        "REKRUT", "AMATOR", "STABILNY", "SIŁACZ", "ATLETA", 
        "KULTURYSTA", "DZIK", "TYTAN", "ELITA", "LEGENDA"
    ];

    // Dane demo do rankingu
    const mockDb = [
        {name: "Unit_Alpha", ratio: 2.85},
        {name: "CyberPudzian", ratio: 2.60},
        {name: "Steel_Bicep", ratio: 2.10},
        {name: "Ty (Obliczanie...)", ratio: 0, isUser: true},
        {name: "Chrome_Squat", ratio: 1.80},
    ];

    function updateSystem() {
        const weight = parseFloat(document.getElementById('userWeight').value) || 0;
        
        // Pobranie danych i wyliczenie ratio z "gładkim" filtrowaniem (jeśli 0, ratio 0)
        const getRatio = (inputId) => {
            const val = parseFloat(document.getElementById(inputId).value) || 0;
            return weight > 10 ? val / weight : 0;
        };

        const rChest = getRatio('chest');
        const rBack = getRatio('back');
        const rShoulders = getRatio('shoulders');
        const rLegs = getRatio('legs');
        // Biceps/Triceps mają mniejszy wpływ na ogólną rangę (0.5), bo to małe partie
        const rArms = (getRatio('biceps') + getRatio('triceps')) / 2;

        // --- AKTUALIZACJA WIZUALNA LUDZIKA (SVG) ---
        // Funkcja aktywująca część ciała jeśli ratio > 0.5 (coś ćwiczy)
        const togglePart = (id, ratio) => {
            const el = document.getElementById(id);
            if(ratio > 0.4) el.classList.add('active');
            else el.classList.remove('active');
            
            // Dynamiczne skalowanie grubości (transform-origin musi być ustawiony w CSS lub hardcoded)
            const scale = 1 + (Math.min(ratio, 2) * 0.15); // max 1.3x powiększenia
            // el.style.transform = `scale(${scale})`; // Skalowanie SVG jest trudne, pomijamy dla stabilności
        };

        togglePart('part-chest', rChest);
        togglePart('part-back', rBack); // Używamy klatki jako 'pleców' w tym prostym widoku
        togglePart('part-shoulder-l', rShoulders);
        togglePart('part-shoulder-r', rShoulders);
        togglePart('part-arm-l', rArms);
        togglePart('part-arm-r', rArms);
        togglePart('part-leg-l', rLegs);
        togglePart('part-leg-r', rLegs);

        // --- OBLICZANIE RANGI ---
        // Srednia ważona: główne boje (BP, DL, SQ, OHP) ważą 80%, ręce 20%
        const mainRatio = (rChest + rBack + rShoulders + rLegs) / 4;
        const totalRatio = (mainRatio * 0.8) + (rArms * 0.2);

        // Przeliczenie ratio na indeks rangi (0-9). Zakładamy, że 2.5x wagi to ranga 10.
        let rankIdx = Math.floor(totalRatio * 4); // 2.5 * 4 = 10
        if(rankIdx > 9) rankIdx = 9;
        if(rankIdx < 0 || weight <= 10) rankIdx = 0;

        // --- AKTUALIZACJA UI RANGI ---
        document.getElementById('rank-name').innerText = weight > 10 ? ranks[rankIdx] : "INICJACJA";
        document.getElementById('avg-ratio').innerText = totalRatio.toFixed(2);
        
        // Pasek postępu (max to 3.0 dla elity)
        const progressPerc = Math.min((totalRatio / 3.0) * 100, 100);
        document.getElementById('perf-fill').style.width = progressPerc + "%";

        // Kategoria wagowa
        document.getElementById('weight-cat-label').innerText = weight > 0 ? Math.floor(weight) : "0";

        updateRanking(totalRatio);
    }

    function updateRanking(userRatio) {
        const tbody = document.getElementById('ranking-body');
        // Klonujemy bazę, wrzucamy wynik użytkownika i sortujemy
        const currentData = [...mockDb];
        currentData[3].ratio = userRatio;
        currentData.sort((a, b) => b.ratio - a.ratio);

        tbody.innerHTML = currentData.map((player, index) => `
            <tr class="${player.isUser ? 'user-row' : ''}">
                <td>${index + 1}</td>
                <td>${player.isUser ? 'TY (PROTOKÓŁ)' : player.name}</td>
                <td><span class="stat-value">${player.ratio.toFixed(2)}x</span></td>
            </tr>
        `).join('');
    }

    // Start systemu
    updateSystem();
</script>

</body>
</html>
