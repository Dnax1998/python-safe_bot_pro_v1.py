<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - NeoRun</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .avatar { width: 100px; height: 100px; background: #1a1a1a; border-radius: 50%; margin: 20px auto; border: 2px solid #00ff88; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .stat-card { background: #111; padding: 20px; border-radius: 20px; margin: 10px 0; border: 1px solid #222; }
        .val { font-size: 1.5rem; color: #00ff88; font-weight: bold; }
        .label { color: #666; font-size: 0.8rem; text-transform: uppercase; }
        .btn-back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← Wstecz</a>
    <div class="avatar">👤</div>
    <h2>BIEGACZ NEO</h2>
    
    <div class="stat-card">
        <div id="total-km" class="val">0.00</div>
        <div class="label">Suma Kilometrów</div>
    </div>
    <div class="stat-card">
        <div id="total-runs" class="val">0</div>
        <div class="label">Ukończone Biegi</div>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
        let total = 0;
        history.forEach(r => total += parseFloat(r.dist));
        
        document.getElementById('total-km').innerText = total.toFixed(2) + " KM";
        document.getElementById('total-runs').innerText = history.length;
    </script>
</body>
</html>
