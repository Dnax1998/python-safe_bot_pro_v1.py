<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klubowy System Konspektów</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ececec; margin: 0; }
        
        /* Nawigacja (Zakładki) */
        nav { background: var(--primary); display: flex; justify-content: center; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 16px; }
        nav button.active { background: var(--accent); }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }

        /* Edytor Grafiki */
        #canvas-container { position: relative; border: 2px solid #333; width: 600px; height: 400px; margin: 10px auto; background: #2e7d32; /* Kolor boiska */ }
        canvas { cursor: crosshair; }
        .toolbar { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        
        /* Formularz i Listy */
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea, select { padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        .konspekt-card { border-left: 5px solid var(--accent); background: #f9f9f9; padding: 20px; margin-top: 20px; border-radius: 4px; }
        .konspekt-card img { max-width: 100%; border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('lista')" id="btn-lista" class="active">Baza Treningów</button>
    <button onclick="showPage('dodaj')">Dodaj Konspekt</button>
    <button onclick="showPage('generator')">Generator Grafiki</button>
</nav>

<div class="container">
    
    <div id="lista" class="page active">
        <h2>Ostatnie konspekty</h2>
        <div id="konspektyList"></div>
    </div>

    <div id="dodaj" class="page">
        <h2>Nowy Konspekt</h2>
        <form id="trainerForm">
            <input type="text" id="title" placeholder="Temat treningu..." required>
            <textarea id="description" rows="5" placeholder="Opis ćwiczenia, przebieg, ograniczenia..." required></textarea>
            <input type="text" id="finalImageUrl" placeholder="Link do grafiki (możesz wkleić link z generatora)">
            <button type="submit" class="btn-save">ZAPISZ W BAZIE</button>
        </form>
    </div>

    <div id="generator" class="page">
        <h2>Tablica Taktyczna</h2>
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#ffffff">
            <button onclick="clearCanvas()">Wyczyść boisko</button>
            <button onclick="downloadCanvas()" style="background: #2980b9; color: white; border: none; padding: 5px 10px; cursor: pointer;">Pobierz grafikę</button>
        </div>
        <p style="text-align:center; font-size: 12px;">Narysuj schemat (pachołki, podania, ruch zawodnika), pobierz go i wklej link/użyj w opisie.</p>
        <div id="canvas-container">
            <canvas id="tacticalBoard" width="600" height="400"></canvas>
        </div>
    </div>

</div>

<script>
    // --- NAWIGACJA ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.target.classList.add('active');
    }

    // --- GENERATOR GRAFIKI (CANVAS) ---
    const canvas = document.getElementById('tacticalBoard');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Rysowanie boiska (tło)
    function drawPitch() {
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, 580, 380); // Linie boczne
        ctx.beginPath();
        ctx.moveTo(300, 10); ctx.lineTo(300, 390); // Linia środkowa
        ctx.stroke();
    }
    drawPitch();

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.strokeStyle = document.getElementById('colorPicker').value;

        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPitch();
    }

    function downloadCanvas() {
        const link = document.createElement('a');
        link.download = 'schemat-treningu.png';
        link.href = canvas.toDataURL();
        link.click();
        alert("Grafika została pobrana! Możesz ją teraz dodać do konspektu.");
    }

    // --- OBSŁUGA FORMULARZA ---
    const form = document.getElementById('trainerForm');
    const list = document.getElementById('konspektyList');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const desc = document.getElementById('description').value;
        const img = document.getElementById('finalImageUrl').value;

        const card = document.createElement('div');
        card.className = 'konspekt-card';
        card.innerHTML = `
            <h3>${title}</h3>
            <p style="white-space: pre-wrap;">${desc}</p>
            ${img ? `<img src="${img}" alt="Grafika treningowa">` : '<p><i>Brak załączonej grafiki</i></p>'}
        `;

        list.prepend(card);
        form.reset();
        showPage('lista');
    });
</script>

</body>
</html>
