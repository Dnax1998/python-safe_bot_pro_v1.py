<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gablota - NeoRun</title>
    <style>
        :root { 
            --neon: #00ff88; --dark: #000; 
            --t1: #cd7f32; --t2: #a19d94; --t3: #e5e4e2; --t4: #ffd700; --t5: #b9f2ff;
        }
        body { 
            background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; 
        }
        
        .header { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; }
        .btn-back { background: #1a1a1a; color: white; padding: 12px; border-radius: 12px; text-decoration: none; border: 1px solid #333; }

        .trophy-card { 
            background: #111; border: 2px solid #222; padding: 40px 20px; 
            border-radius: 30px; text-align: center; transition: 0.5s;
            width: 200px;
        }
        
        /* Stan zablokowany (Tier 0) */
        .locked { opacity: 0.3; filter: grayscale(1); }
        
        /* Stan odblokowany */
        .unlocked { border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }

        .icon-container { font-size: 80px; margin-bottom: 20px; }
        
        .tier-label { 
            font-size: 12px; font-weight: bold; text-transform: uppercase; 
            padding: 5px 15px; border-radius: 10px; margin-bottom: 15px; display: inline-block;
        }
        
        .tier0 { background: #333; color: #888; }
        .tier1 { background: var(--t1); color: #000; }
        .tier2 { background: var(--t2); color: #000; }
        .tier3 { background: var(--t3); color: #000; }
        .tier4 { background: var(--t4); color: #000; }
        .tier5 { background: var(--t5); color: #000; }

        .name { font-weight: bold; font-size: 20px; display: block; color: #fff; margin-bottom: 8px; }
        .desc { font-size: 14px; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">←</a>
    </div>

    <div id="display">
        </div>

    <script>
        const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
        let totalKm = 0;
        history.forEach(r => totalKm += parseFloat(r.dist));

        function getShoe() {
            if (totalKm >= 500) return { name: "Diamentowy But", icon: "👟", tier: 5, tName: "Tier V", label: "MAX POZIOM", class: "unlocked" };
            if (totalKm >= 250) return { name: "Złoty But", icon: "👟", tier: 4, tName: "Tier IV", label: "Do 500km", class: "unlocked" };
            if (totalKm >= 100) return { name: "Srebrny But", icon: "👟", tier: 3, tName: "Tier III", label: "Do 250km", class: "unlocked" };
            if (totalKm >= 25)  return { name: "Żelazny But", icon: "👟", tier: 2, tName: "Tier II", label: "Do 100km", class: "unlocked" };
            if (totalKm >= 1)   return { name: "Brązowy But", icon: "👟", tier: 1, tName: "Tier I", label: "Do 25km", class: "unlocked" };
            
            // Tier 0 - Zablokowany
            return { name: "Buty Treningowe", icon: "👟", tier: 0, tName: "Tier 0", label: "Przebiegnij 1 km", class: "locked" };
        }

        const s = getShoe();
        const container = document.getElementById('display');

        container.innerHTML = `
            <div class="trophy-card ${s.class}">
                <span class="tier-label tier${s.tier}">${s.tName}</span>
                <div class="icon-container">${s.icon}</div>
                <span class="name">${s.name}</span>
                <span class="desc">${s.label}</span>
            </div>
        `;
    </script>
</body>
</html>
