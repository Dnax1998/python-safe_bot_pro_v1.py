<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitGenerator Pro - Wybierz Dietę</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #76a310;
            --orange-btn: #e67e22;
            --dark-blue: #1b4f72;
            --bg-light: #f9f9f9;
        }

        body { font-family: 'Poppins', sans-serif; background-color: #e9ecef; margin: 0; padding: 0; }

        .hero {
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; height: 180px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { font-size: 36px; color: var(--dark-blue); margin: 0; }
        .hero h1 span { color: var(--orange-btn); }

        .main-wrapper {
            max-width: 1200px; margin: -30px auto 40px;
            display: grid; grid-template-columns: 280px 1fr; gap: 25px; padding: 0 20px;
        }

        /* SIDEBAR */
        .sidebar { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        .sidebar-section h3 { background: var(--dark-blue); color: white; padding: 10px; border-radius: 6px; font-size: 15px; margin-bottom: 15px; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit; cursor: pointer; }

        .btn-side { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-green { background: var(--primary-green); margin-top: 10px; }
        .btn-green:hover { background: #5d820d; }

        /* CONTENT */
        .content-area { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .meals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }

        .meal-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; }
        .meal-img { width: 100%; height: 150px; object-fit: cover; }
        .meal-body { padding: 15px; }
        .meal-type { font-weight: bold; color: var(--dark-blue); font-size: 16px; }
        .meal-name { font-size: 14px; color: #666; height: 40px; margin: 5px 0; }
        .meal-kcal { color: var(--primary-green); font-weight: bold; font-size: 18px; margin-bottom: 10px; }

        .meal-btns { display: flex; gap: 8px; }
        .btn-meal { flex: 1; padding: 8px; border: none; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; }
        .btn-swap { background: var(--primary-green); }
        .btn-recipe { background: var(--dark-blue); }

        .footer-summary {
            grid-column: 1 / -1; background: var(--dark-blue); color: white;
            padding: 20px; border-radius: 10px; display: flex; justify-content: space-around;
            flex-wrap: wrap; margin-top: 25px; font-weight: bold;
        }

        .recipe-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
        }
        .recipe-content { background: white; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; position: relative; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Wybierz <span>Swoją Dietę!</span></h1>
    <p>Idealnie dopasowane kalorie i makroskładniki.</p>
</div>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Ustawienia Diety</h3>
            
            <div class="control-group">
                <label>Rodzaj Diety:</label>
                <select id="dietType" onchange="generatePlan()">
                    <option value="Standardowa">Standardowa</option>
                    <option value="Wegetariańska">Wegetariańska</option>
                    <option value="Sportowa (Wysokobiałkowa)">Sportowa</option>
                </select>
            </div>

            <div class="control-group">
                <label>Cel Kaloryczny:</label>
                <select id="targetKcal" onchange="generatePlan()">
                    <option value="1500">1500 kcal</option>
                    <option value="1800" selected>1800 kcal</option>
                    <option value="2000">2000 kcal</option>
                    <option value="2500">2500 kcal</option>
                    <option value="3000">3000 kcal</option>
                </select>
            </div>

            <div class="control-group">
                <label><input type="checkbox" id="noFish" onchange="generatePlan()"> Wyklucz ryby</label>
            </div>

            <button class="btn-side btn-green" onclick="generatePlan()">GENERUJ NOWY PLAN</button>
        </div>
    </div>

    <div class="content-area">
        <h2 id="planTitle">Twój Plan: 1800 kcal</h2>
        <div id="mealsGrid" class="meals-grid"></div>

        <div class="footer-summary" id="summary"></div>
    </div>
</div>

<div class="recipe-overlay" id="recipeModal" onclick="this.style.display='none'">
    <div class="recipe-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <button class="btn-side btn-orange" onclick="document.getElementById('recipeModal').style.display='none'">Zamknij</button>
    </div>
</div>

<script>
    const database = [
        { type: "Śniadanie", name: "Owsianka z owocami", kcal: 400, p: 15, f: 8, w: 60, fish: false, tags: ["Standardowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1517673400267-0251440c45dc?w=400" },
        { type: "Śniadanie", name: "Omlet proteinowy", kcal: 450, p: 30, f: 20, w: 10, fish: false, tags: ["Sportowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400" },
        { type: "Lunch", name: "Kurczak z ryżem i brokułem", kcal: 500, p: 40, f: 10, w: 60, fish: false, tags: ["Standardowa", "Sportowa"], img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400" },
        { type: "Lunch", name: "Bowl z tofu i komosą", kcal: 480, p: 20, f: 15, w: 55, fish: false, tags: ["Wegetariańska"], img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
        { type: "Lunch", name: "Pieczony Łosoś", kcal: 550, p: 35, f: 30, w: 10, fish: true, tags: ["Standardowa", "Sportowa"], img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400" },
        { type: "Przekąska", name: "Serek wiejski z orzechami", kcal: 250, p: 20, f: 12, w: 10, fish: false, tags: ["Standardowa", "Sportowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
        { type: "Kolacja", name: "Sałatka z tuńczykiem", kcal: 400, p: 30, f: 15, w: 20, fish: true, tags: ["Standardowa"], img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" },
        { type: "Kolacja", name: "Lekka sałatka z fetą", kcal: 350, p: 12, f: 20, w: 25, fish: false, tags: ["Wegetariańska"], img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" }
    ];

    let currentPlan = [];
    const mealTypes = ["Śniadanie", "Lunch", "Przekąska", "Kolacja"];

    function generatePlan() {
        const target = parseInt(document.getElementById('targetKcal').value);
        const diet = document.getElementById('dietType').value;
        const noFish = document.getElementById('noFish').checked;
        
        document.getElementById('planTitle').innerText = `Twój Plan: ${target} kcal`;

        currentPlan = mealTypes.map(type => {
            let options = database.filter(d => d.type === type && d.tags.includes(diet));
            if (noFish) options = options.filter(d => !d.fish);
            if (options.length === 0) options = database.filter(d => d.type === type); // Fallback
            
            return {...options[Math.floor(Math.random() * options.length)]};
        });

        calculateAndRender();
    }

    function calculateAndRender() {
        const target = parseInt(document.getElementById('targetKcal').value);
        let currentTotal = currentPlan.reduce((sum, m) => sum + m.kcal, 0);
        
        // Magia: Skalowanie porcji, aby kalorie DOKŁADNIE się zgadzały
        const multiplier = target / currentTotal;

        const grid = document.getElementById('mealsGrid');
        grid.innerHTML = '';
        let sums = { kcal: 0, p: 0, f: 0, w: 0 };

        currentPlan.forEach((meal, i) => {
            const scaledKcal = Math.round(meal.kcal * multiplier);
            const scaledP = Math.round(meal.p * multiplier);
            const scaledF = Math.round(meal.f * multiplier);
            const scaledW = Math.round(meal.w * multiplier);

            sums.kcal += scaledKcal; sums.p += scaledP; sums.f += scaledF; sums.w += scaledW;

            grid.innerHTML += `
                <div class="meal-card">
                    <img src="${meal.img}" class="meal-img">
                    <div class="meal-body">
                        <span class="meal-type">${meal.type}</span>
                        <div class="meal-name">${meal.name}</div>
                        <div class="meal-kcal">${scaledKcal} kcal</div>
                        <div class="meal-btns">
                            <button class="btn-meal btn-swap" onclick="swapMeal(${i})">Zmień</button>
                            <button class="btn-meal btn-recipe" onclick="alert('Przepis: Standardowe przygotowanie dla porcji ${scaledKcal} kcal.')">Przepis</button>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('summary').innerHTML = `
            <div>Suma: ${sums.kcal} kcal</div>
            <div>Białko: ${sums.p}g</div>
            <div>Tłuszcze: ${sums.f}g</div>
            <div>Węgle: ${sums.w}g</div>`;
    }

    function swapMeal(index) {
        const diet = document.getElementById('dietType').value;
        const noFish = document.getElementById('noFish').checked;
        const type = currentPlan[index].type;
        
        let options = database.filter(d => d.type === type && d.tags.includes(diet) && d.name !== currentPlan[index].name);
        if (noFish) options = options.filter(d => !d.fish);
        
        if(options.length > 0) {
            currentPlan[index] = {...options[Math.floor(Math.random() * options.length)]};
            calculateAndRender();
        }
    }

    // Inicjalizacja przy starcie
    generatePlan();
</script>
</body>
</html>
