<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybierz Swoją Dietę - Planer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #76a310;
            --orange-btn: #e67e22;
            --dark-blue: #1b4f72;
            --bg-light: #f9f9f9;
            --text-main: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* BANER GÓRNY */
        .hero {
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 { font-size: 42px; margin: 0; color: var(--dark-blue); }
        .hero h1 span { color: var(--orange-btn); }
        .hero p { font-size: 18px; color: #555; }

        /* GŁÓWNY UKŁAD */
        .main-wrapper {
            max-width: 1200px;
            margin: -40px auto 40px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 25px;
            padding: 0 20px;
        }

        /* LEWY PANEL */
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .sidebar-section { margin-bottom: 25px; }
        .sidebar-section h3 { 
            background: var(--dark-blue); color: white; 
            padding: 10px; border-radius: 6px; font-size: 16px; margin-bottom: 15px;
        }

        .sidebar-item { margin: 10px 0; font-size: 14px; }
        .sidebar-item b { color: var(--orange-btn); }

        .btn-side {
            width: 100%; padding: 10px; border: none; border-radius: 6px;
            color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .btn-green { background: var(--primary-green); }
        .btn-orange { background: var(--orange-btn); }

        /* DNI TYGODNIA */
        .days-grid { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .day { 
            padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; 
            font-size: 12px; cursor: pointer; background: white;
        }
        .day.active { background: var(--dark-blue); color: white; border-color: var(--dark-blue); }

        /* PANEL POSIŁKÓW */
        .content-area {
            background: white; border-radius: 12px; padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .content-area h2 { color: var(--dark-blue); margin-top: 0; }

        .meals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .meal-card {
            border: 1px solid #eee; border-radius: 12px; overflow: hidden;
            background: #fff; transition: transform 0.2s;
        }
        .meal-card:hover { transform: translateY(-5px); }

        .meal-img { width: 100%; height: 160px; object-fit: cover; }
        
        .meal-body { padding: 15px; }
        .meal-type { font-weight: bold; color: var(--dark-blue); font-size: 18px; display: block; }
        .meal-name { font-size: 14px; color: #666; height: 40px; }
        .meal-kcal { color: var(--primary-green); font-weight: bold; margin: 10px 0; }

        .meal-btns { display: flex; gap: 8px; }
        .btn-meal {
            flex: 1; padding: 8px; border: none; border-radius: 4px;
            color: white; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-swap { background: var(--primary-green); }
        .btn-recipe { background: var(--dark-blue); }

        /* PODSUMOWANIE */
        .footer-summary {
            grid-column: 1 / -1;
            background: #f1f1f1;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 20px;
            font-weight: bold;
        }

        /* MODAL / PRZEPIS */
        .recipe-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .recipe-content { background: white; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Wybierz <span>Swoją Dietę!</span></h1>
    <p>Planuj posiłki i wymieniaj dania według swoich potrzeb.</p>
</div>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Wybór Diety</h3>
            <div class="sidebar-item">Rodzaj Diety: <b id="dietType">Redukcyjna</b></div>
            <div class="sidebar-item">Cel Kaloryczny: <b id="targetKcal">1800 kcal</b></div>
            <button class="btn-side btn-green" onclick="alert('Funkcja zmiany diety w budowie')">Zmień Dietę</button>
            <button class="btn-side btn-orange" onclick="changeCals()">Zmień Kalorie</button>
        </div>

        <div class="sidebar-section">
            <h3>Plan Tygodnia</h3>
            <div class="days-grid">
                <div class="day">Pon</div><div class="day">Wt</div><div class="day active">Śr</div>
                <div class="day">Czw</div><div class="day">Pt</div><div class="day">Sob</div><div class="day">Ndz</div>
            </div>
            <div style="margin-top:15px; font-size: 13px; color: #888;">
                <input type="checkbox" id="noFish" onchange="generatePlan()"> Wyklucz ryby
            </div>
        </div>
    </div>

    <div class="content-area">
        <h2>Twój Plan Na Dziś</h2>
        <div id="mealsGrid" class="meals-grid">
            </div>

        <div class="footer-summary" id="summary">
            </div>
    </div>
</div>

<div class="recipe-overlay" id="recipeModal" onclick="this.style.display='none'">
    <div class="recipe-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle">Przepis</h2>
        <p id="modalText"></p>
        <button class="btn-side btn-orange" onclick="document.getElementById('recipeModal').style.display='none'">Zamknij</button>
    </div>
</div>

<script>
    const database = [
        { type: "Śniadanie", name: "Owsianka z borówkami i miodem", kcal: 430, p: 15, f: 10, w: 65, fish: false, img: "https://images.unsplash.com/photo-1517673400267-0251440c45dc?w=400", recipe: "Płatki owsiane gotuj na mleku 5 minut. Dodaj borówki i łyżeczkę miodu." },
        { type: "Śniadanie", name: "Jajecznica na pomidorach", kcal: 400, p: 25, f: 30, w: 5, fish: false, img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400", recipe: "Podduś pomidory na patelni, wbij 3 jajka. Podawaj z pieczywem pełnoziarnistym." },
        { type: "Lunch", name: "Kurczak grillowany z warzywami", kcal: 520, p: 40, f: 12, w: 60, fish: false, img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400", recipe: "Pierś z kurczaka przypraw i grilluj. Podawaj z kaszą i miksem sałat." },
        { type: "Lunch", name: "Pieczony łosoś z koperkiem", kcal: 550, p: 35, f: 35, w: 10, fish: true, img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400", recipe: "Rybę oprósz solą i koperkiem, piecz 15 min w 180C." },
        { type: "Przekąska", name: "Jogurt naturalny z orzechami", kcal: 200, p: 10, f: 15, w: 12, fish: false, img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400", recipe: "Do jogurtu wsyp posiekane orzechy włoskie i nasiona chia." },
        { type: "Kolacja", name: "Sałatka z tuńczykiem i jajkiem", kcal: 450, p: 35, f: 20, w: 15, fish: true, img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400", recipe: "Wymieszaj sałatę, tuńczyka, jajko na twardo i oliwę z oliwek." },
        { type: "Kolacja", name: "Twarożek z rzodkiewką", kcal: 320, p: 30, f: 8, w: 12, fish: false, img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400", recipe: "Chudy twaróg wymieszaj z jogurtem, rzodkiewką i szczypiorkiem." }
    ];

    let currentPlan = [];
    const types = ["Śniadanie", "Lunch", "Przekąska", "Kolacja"];

    function generatePlan() {
        const noFish = document.getElementById('noFish').checked;
        currentPlan = types.map(t => {
            const options = database.filter(d => d.type === t && (!noFish || !d.fish));
            return {...options[Math.floor(Math.random() * options.length)]};
        });
        render();
    }

    function swapMeal(index) {
        const noFish = document.getElementById('noFish').checked;
        const currentType = currentPlan[index].type;
        const options = database.filter(d => d.type === currentType && d.name !== currentPlan[index].name && (!noFish || !d.fish));
        
        if(options.length > 0) {
            currentPlan[index] = {...options[Math.floor(Math.random() * options.length)]};
            render();
        }
    }

    function showRecipe(index) {
        const meal = currentPlan[index];
        document.getElementById('modalTitle').innerText = meal.name;
        document.getElementById('modalText').innerText = meal.recipe;
        document.getElementById('recipeModal').style.display = 'flex';
    }

    function changeCals() {
        let val = prompt("Podaj nowy cel kaloryczny (np. 1500, 2000, 2500):");
        if(val) document.getElementById('targetKcal').innerText = val + " kcal";
    }

    function render() {
        const grid = document.getElementById('mealsGrid');
        grid.innerHTML = '';
        let sums = { kcal: 0, p: 0, f: 0, w: 0 };

        currentPlan.forEach((meal, i) => {
            sums.kcal += meal.kcal; sums.p += meal.p; sums.f += meal.f; sums.w += meal.w;
            
            grid.innerHTML += `
                <div class="meal-card">
                    <img src="${meal.img}" class="meal-img">
                    <div class="meal-body">
                        <span class="meal-type">${meal.type}</span>
                        <div class="meal-name">${meal.name}</div>
                        <div class="meal-kcal">${meal.kcal} kcal</div>
                        <div class="meal-btns">
                            <button class="btn-meal btn-swap" onclick="swapMeal(${i})">Zmień</button>
                            <button class="btn-meal btn-recipe" onclick="showRecipe(${i})">Przepis</button>
                        </div>
                    </div>
                </div>
            `;
        });

        document.getElementById('summary').innerHTML = `
            <span>Podsumowanie Dnia: ${sums.kcal} kcal</span>
            <span>Białko: ${sums.p}g</span>
            <span>Węglowodany: ${sums.w}g</span>
            <span>Tłuszcze: ${sums.f}g</span>
        `;
    }

    // Start
    generatePlan();
</script>

</body>
</html>
