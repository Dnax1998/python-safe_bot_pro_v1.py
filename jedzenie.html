<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twoja Darmowa Dieta</title>
    <style>
        :root {
            --primary: #4CAF50;
            --dark: #2e7d32;
            --light: #f4f4f4;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--dark); }
        
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; }
        select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; }
        button:hover { background: var(--dark); }

        .meal-card { border-bottom: 1px solid #eee; padding: 15px 0; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; }
        .recipe { display: none; margin-top: 10px; padding: 10px; background: #fafafa; font-size: 0.9em; border-left: 3px solid var(--primary); }
        
        .summary { margin-top: 20px; padding: 20px; background: var(--dark); color: white; border-radius: 10px; text-align: center; }
        .badge { background: #ff9800; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Planer Diety 2.0</h1>
    
    <div class="filters">
        <label>Kalorie: 
            <select id="calLimit">
                <option value="1500">1500 kcal</option>
                <option value="2000" selected>2000 kcal</option>
                <option value="2500">2500 kcal</option>
            </select>
        </label>
        <label>Wyklucz: 
            <input type="checkbox" id="noFish"> Ryby
        </label>
        <button onclick="generatePlan()">Generuj nowy plan</button>
    </div>

    <div id="mealPlan">
        </div>

    <div class="summary" id="summary">
        Podsumowanie: 0 kcal | B: 0g | T: 0g | W: 0g
    </div>
</div>

<script>
    // Przykładowa baza danych (możesz ją rozbudować!)
    const database = [
        { id: 1, type: "Śniadanie", name: "Owsianka z borówkami", kcal: 400, protein: 15, fat: 10, carbs: 60, recipe: "Zalej płatki mlekiem, gotuj 5 min, dodaj owoce.", fish: false },
        { id: 2, type: "Śniadanie", name: "Jajecznica na maśle", kcal: 450, protein: 20, fat: 35, carbs: 5, recipe: "Smaż 3 jajka na 10g masła. Podawaj z chlebem.", fish: false },
        { id: 3, type: "Obiad", name: "Kurczak z ryżem", kcal: 600, protein: 40, fat: 10, carbs: 80, recipe: "Ugotuj ryż. Podduś pierś z kurczaka z przyprawami.", fish: false },
        { id: 4, type: "Obiad", name: "Łosoś pieczony", kcal: 600, protein: 35, fat: 30, carbs: 40, recipe: "Piecz łososia 15 min w 180st. Podawaj z ziemniakami.", fish: true },
        { id: 5, type: "Kolacja", name: "Sałatka z tuńczykiem", kcal: 350, protein: 25, fat: 15, carbs: 20, recipe: "Wymieszaj sałatę, tuńczyka z puszki i oliwę.", fish: true },
        { id: 6, type: "Kolacja", name: "Twarożek na słono", kcal: 300, protein: 30, fat: 5, carbs: 10, recipe: "Chudy twaróg wymieszaj z rzodkiewką i jogurtem.", fish: false },
        { id: 7, type: "Podwieczorek", name: "Jabłko i orzechy", kcal: 200, protein: 5, fat: 12, carbs: 25, recipe: "Zjedz świeże jabłko i garść orzechów włoskich.", fish: false }
    ];

    let currentPlan = [];

    function generatePlan() {
        const limit = parseInt(document.getElementById('calLimit').value);
        const excludeFish = document.getElementById('noFish').checked;
        const types = ["Śniadanie", "Obiad", "Podwieczorek", "Kolacja"];
        
        currentPlan = [];
        
        types.forEach(type => {
            const options = database.filter(m => m.type === type && (!excludeFish || !m.fish));
            const randomMeal = options[Math.floor(Math.random() * options.length)];
            if(randomMeal) currentPlan.push({...randomMeal});
        });

        render();
    }

    function toggleRecipe(id) {
        const el = document.getElementById(`recipe-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function swapMeal(index) {
        const meal = currentPlan[index];
        const excludeFish = document.getElementById('noFish').checked;
        const options = database.filter(m => m.type === meal.type && m.id !== meal.id && (!excludeFish || !m.fish));
        
        if(options.length > 0) {
            currentPlan[index] = {...options[Math.floor(Math.random() * options.length)]};
            render();
        } else {
            alert("Brak innych posiłków tego typu w bazie!");
        }
    }

    function render() {
        const container = document.getElementById('mealPlan');
        container.innerHTML = "";
        let totalKcal = 0, totalP = 0, totalF = 0, totalC = 0;

        currentPlan.forEach((meal, index) => {
            totalKcal += meal.kcal;
            totalP += meal.protein;
            totalF += meal.fat;
            totalC += meal.carbs;

            container.innerHTML += `
                <div class="meal-card">
                    <div class="meal-header">
                        <div>
                            <strong>${meal.type}:</strong> ${meal.name} 
                            <span class="badge">${meal.kcal} kcal</span>
                        </div>
                        <div>
                            <button onclick="toggleRecipe(${index})" style="background:#2196F3">Rozwiń</button>
                            <button onclick="swapMeal(${index})" style="background:#f44336">Zmień</button>
                        </div>
                    </div>
                    <div class="recipe" id="recipe-${index}">
                        <strong>Jak przygotować:</strong><br>${meal.recipe}<br>
                        <small>Makro: B:${meal.protein}g | T:${meal.fat}g | W:${meal.carbs}g</small>
                    </div>
                </div>
            `;
        });

        document.getElementById('summary').innerHTML = 
            `SUMA DNIA: ${totalKcal} kcal | Białko: ${totalP}g | Tłuszcze: ${totalF}g | Węglowodany: ${totalC}g`;
    }

    // Pierwsze uruchomienie
    generatePlan();
</script>

</body>
</html>
