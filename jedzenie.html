<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitGenerator Pro - Wybierz Dietę</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #76a310;
            --orange-btn: #e67e22;
            --dark-blue: #1b4f72;
            --bg-light: #f9f9f9;
        }

        body { font-family: 'Poppins', sans-serif; background-color: #e9ecef; margin: 0; padding: 0; }

        .hero {
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; height: 180px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { font-size: 36px; color: var(--dark-blue); margin: 0; }
        .hero h1 span { color: var(--orange-btn); }

        .main-wrapper {
            max-width: 1200px; margin: -30px auto 40px;
            display: grid; grid-template-columns: 280px 1fr; gap: 25px; padding: 0 20px;
        }

        /* SIDEBAR */
        .sidebar { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        .sidebar-section h3 { background: var(--dark-blue); color: white; padding: 10px; border-radius: 6px; font-size: 15px; margin-bottom: 15px; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit; cursor: pointer; background: white; }

        .btn-side { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-green { background: var(--primary-green); margin-top: 10px; }
        .btn-green:hover { background: #5d820d; }

        /* CONTENT */
        .content-area { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .meals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }

        .meal-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
        .meal-img { width: 100%; height: 150px; object-fit: cover; }
        .meal-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .meal-type { font-weight: bold; color: var(--dark-blue); font-size: 16px; }
        .meal-name { font-size: 14px; color: #666; margin: 5px 0; min-height: 40px; }
        .meal-kcal { color: var(--primary-green); font-weight: bold; font-size: 18px; margin-bottom: 10px; }

        .meal-btns { display: flex; gap: 8px; margin-top: auto; }
        .btn-meal { flex: 1; padding: 8px; border: none; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-swap { background: var(--primary-green); }
        .btn-recipe { background: var(--dark-blue); }

        .footer-summary {
            background: var(--dark-blue); color: white;
            padding: 20px; border-radius: 10px; display: flex; justify-content: space-around;
            flex-wrap: wrap; margin-top: 25px; font-weight: bold;
        }

        .summary-item { text-align: center; padding: 5px 15px; }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .hero h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Wybierz <span>Swoją Dietę!</span></h1>
    <p>Zmieniaj posiłki i kontroluj kalorie w czasie rzeczywistym.</p>
</div>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Ustawienia Diety</h3>
            
            <div class="control-group">
                <label>Rodzaj Diety:</label>
                <select id="dietType">
                    <option value="Standardowa">Standardowa</option>
                    <option value="Wegetariańska">Wegetariańska</option>
                    <option value="Sportowa">Sportowa</option>
                </select>
            </div>

            <div class="control-group">
                <label>Cel Kaloryczny:</label>
                <select id="targetKcal">
                    <option value="1500">1500 kcal</option>
                    <option value="1800">1800 kcal</option>
                    <option value="2000" selected>2000 kcal</option>
                    <option value="2500">2500 kcal</option>
                    <option value="3000">3000 kcal</option>
                </select>
            </div>

            <div class="control-group">
                <label><input type="checkbox" id="noFish"> Wyklucz ryby</label>
            </div>

            <button class="btn-side btn-green" id="mainGenBtn">WYGENERUJ NOWY PLAN</button>
        </div>
    </div>

    <div class="content-area">
        <h2 id="planTitle">Twoje Posiłki</h2>
        <div id="mealsGrid" class="meals-grid">
            </div>

        <div class="footer-summary" id="summary">
            </div>
    </div>
</div>

<script>
    const database = [
        { type: "Śniadanie", name: "Owsianka z borówkami", kcal: 400, p: 15, f: 8, w: 60, fish: false, tags: ["Standardowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1517673400267-0251440c45dc?w=400" },
        { type: "Śniadanie", name: "Jajecznica z 3 jaj", kcal: 450, p: 25, f: 30, w: 5, fish: false, tags: ["Standardowa", "Sportowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400" },
        { type: "Śniadanie", name: "Kanapki z awokado", kcal: 420, p: 12, f: 22, w: 45, fish: false, tags: ["Standardowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400" },
        
        { type: "Lunch", name: "Kurczak z ryżem i brokułem", kcal: 600, p: 45, f: 10, w: 75, fish: false, tags: ["Standardowa", "Sportowa"], img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400" },
        { type: "Lunch", name: "Bowl z tofu i komosą", kcal: 550, p: 22, f: 18, w: 65, fish: false, tags: ["Wegetariańska"], img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
        { type: "Lunch", name: "Pieczony Łosoś z ziemniakami", kcal: 620, p: 38, f: 35, w: 40, fish: true, tags: ["Standardowa", "Sportowa"], img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400" },
        
        { type: "Przekąska", name: "Skyr z orzechami", kcal: 250, p: 22, f: 12, w: 15, fish: false, tags: ["Standardowa", "Sportowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
        { type: "Przekąska", name: "Jabłko i masło orzechowe", kcal: 280, p: 6, f: 18, w: 25, fish: false, tags: ["Standardowa", "Wegetariańska"], img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
        
        { type: "Kolacja", name: "Sałatka Cezar z kurczakiem", kcal: 450, p: 35, f: 22, w: 15, fish: false, tags: ["Standardowa", "Sportowa"], img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" },
        { type: "Kolacja", name: "Sałatka z tuńczykiem", kcal: 420, p: 32, f: 18, w: 20, fish: true, tags: ["Standardowa"], img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" },
        { type: "Kolacja", name: "Twaróg ze szczypiorkiem", kcal: 320, p: 35, f: 8, w: 12, fish: false, tags: ["Wegetariańska", "Sportowa"], img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400" }
    ];

    let currentPlan = [];
    const mealTypes = ["Śniadanie", "Lunch", "Przekąska", "Kolacja"];

    function generatePlan() {
        const target = parseInt(document.getElementById('targetKcal').value);
        const diet = document.getElementById('dietType').value;
        const noFish = document.getElementById('noFish').checked;
        
        document.getElementById('planTitle').innerText = `Twój Plan: ${target} kcal`;

        currentPlan = mealTypes.map(type => {
            // Szukamy posiłków spełniających wszystkie kryteria
            let options = database.filter(d => d.type === type && d.tags.includes(diet));
            
            // Jeśli użytkownik nie chce ryb, usuwamy je z opcji
            if (noFish) {
                options = options.filter(d => !d.fish);
            }

            // Fallback: Jeśli po filtrach nic nie zostało, weź cokolwiek tego typu, co nie jest rybą
            if (options.length === 0) {
                options = database.filter(d => d.type === type && (!noFish || !d.fish));
            }

            const selected = options[Math.floor(Math.random() * options.length)];
            return {...selected};
        });

        calculateAndRender();
    }

    function calculateAndRender() {
        const target = parseInt(document.getElementById('targetKcal').value);
        let currentTotalKcal = currentPlan.reduce((sum, m) => sum + m.kcal, 0);
        
        // Mnożnik skalujący porcje do wybranego celu
        const ratio = target / currentTotalKcal;

        const grid = document.getElementById('mealsGrid');
        grid.innerHTML = '';
        let sums = { kcal: 0, p: 0, f: 0, w: 0 };

        currentPlan.forEach((meal, i) => {
            const sKcal = Math.round(meal.kcal * ratio);
            const sP = Math.round(meal.p * ratio);
            const sF = Math.round(meal.f * ratio);
            const sW = Math.round(meal.w * ratio);

            sums.kcal += sKcal; sums.p += sP; sums.f += sF; sums.w += sW;

            grid.innerHTML += `
                <div class="meal-card">
                    <img src="${meal.img}" class="meal-img">
                    <div class="meal-body">
                        <span class="meal-type">${meal.type}</span>
                        <div class="meal-name">${meal.name}</div>
                        <div class="meal-kcal">${sKcal} kcal</div>
                        <div class="meal-btns">
                            <button class="btn-meal btn-swap" onclick="swapMeal(${i})">Zmień</button>
                            <button class="btn-meal btn-recipe" onclick="alert('Przepis: Przygotuj porcję tak, aby miała ${sKcal} kcal. Składniki: B:${sP}g, T:${sF}g, W:${sW}g')">Przepis</button>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('summary').innerHTML = `
            <div class="summary-item">Suma<br>${sums.kcal} kcal</div>
            <div class="summary-item">Białko<br>${sums.p}g</div>
            <div class="summary-item">Tłuszcze<br>${sums.f}g</div>
            <div class="summary-item">Węglowodany<br>${sums.w}g</div>`;
    }

    function swapMeal(index) {
        const diet = document.getElementById('dietType').value;
        const noFish = document.getElementById('noFish').checked;
        const type = currentPlan[index].type;
        
        let options = database.filter(d => d.type === type && d.name !== currentPlan[index].name);
        
        if (noFish) options = options.filter(d => !d.fish);
        // Próbuj dopasować do tagu diety
        let dietOptions = options.filter(d => d.tags.includes(diet));
        
        let finalOptions = dietOptions.length > 0 ? dietOptions : options;
        
        if(finalOptions.length > 0) {
            currentPlan[index] = {...finalOptions[Math.floor(Math.random() * finalOptions.length)]};
            calculateAndRender();
        }
    }

    // Podpięcie przycisku głównego
    document.getElementById('mainGenBtn').addEventListener('click', generatePlan);

    // Pierwsze wywołanie przy załadowaniu strony
    window.onload = generatePlan;
</script>
</body>
</html>
