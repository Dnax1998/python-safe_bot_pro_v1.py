<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia - NeoRun</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .btn-back { background: #1a1a1a; color: white; padding: 12px; border-radius: 12px; text-decoration: none; border: 1px solid #333; display: inline-block; margin-bottom: 20px; }
        .run-item { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #00ff88; display: flex; justify-content: space-between; align-items: center; }
        .run-dist { font-size: 1.2rem; font-weight: bold; color: #00ff88; }
        .run-date { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← POWRÓT</a>
    <h2>HISTORIA AKTYWNOŚCI</h2>
    <div id="history-list"></div>

    <script>
        const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
        const list = document.getElementById('history-list');
        
        if(history.length === 0) {
            list.innerHTML = '<p style="color:#444">Brak biegów. Czas zacząć!</p>';
        } else {
            list.innerHTML = history.reverse().map(run => `
                <div class="run-item">
                    <div>
                        <div class="run-dist">${run.dist} km</div>
                        <div class="run-date">${run.date}</div>
                    </div>
                    <div style="color:#333">🏃‍♂️</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
