<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitQuest 2.0: Cyber-Fantasy RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-main: #060814;
            --panel-bg: rgba(15, 18, 36, 0.85);
            --panel-border: rgba(0, 255, 204, 0.15);
            --neon-cyan: #00ffcc;
            --neon-blue: #0077ff;
            --neon-purple: #9b51e0;
            --neon-red: #ff3838;
            --neon-gold: #ffd32a;
            --text-main: #e2e8f0;
            --text-muted: #747d8c;
            
            /* Rzadkość przedmiotów */
            --common: #ffffff;
            --rare: #00a8ff;
            --epic: #9b51e0;
            --legendary: #ff9f43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #111625 0%, var(--bg-main) 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 18px;
        }

        /* NAGŁÓWEK */
        header {
            background: rgba(6, 8, 20, 0.9);
            padding: 10px 40px;
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue), transparent) 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0,255,204,0.3));
        }

        .currency-container {
            display: flex;
            gap: 20px;
        }

        .currency-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 19px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .currency-box.gold span { color: var(--neon-gold); text-shadow: 0 0 10px rgba(255,211,42,0.3); }
        .currency-box.gems span { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,204,0.3); }

        /* KONTENER GŁÓWNY */
        .game-layout {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .glass-panel:hover { border-color: rgba(0,255,204,0.3); }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            padding: 15px 20px;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            display: flex;
            justify-content: space-between;
        }

        /* NAWYKI */
        #left-panel { flex: 1.2; }
        .creator-row {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
        }
        .creator-row input, .creator-row select {
            background: #090c15;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }
        .creator-row input { flex: 1; }
        
        .btn-action {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            color: #000;
            font-weight: 700;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0,255,204,0.5);
        }

        .scrollable-list {
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .habit-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 5px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .habit-card.bad-habit { border-left-color: var(--neon-red); }
        .habit-name-tag { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .habit-streak-tag { font-size: 14px; color: var(--text-muted); }

        .circle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-good { background: rgba(0, 255, 204, 0.2); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        .btn-good:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); }
        .btn-bad { background: rgba(255, 56, 56, 0.2); color: var(--neon-red); border: 1px solid var(--neon-red); }
        .btn-bad:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 10px var(--neon-red); }
        .btn-del { background: transparent; color: var(--text-muted); margin-left: 10px; }
        .btn-del:hover { color: #fff; }

        /* WALKA I ARENA */
        #center-panel { flex: 1.6; }
        .arena {
            height: 250px;
            background: linear-gradient(to top, rgba(6,8,20,1), rgba(6,8,20,0.4)), url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .char-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            position: relative;
        }

        .circle-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #090c15;
            border: 3px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 25px rgba(0,119,255,0.4);
            transition: transform 0.1s ease;
        }
        #enemy-avatar-node { border-color: var(--neon-red); box-shadow: 0 0 25px rgba(255,56,56,0.4); }

        .bar-wrap {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 5px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s ease; }
        .hp-fill { background: linear-gradient(90deg, #2ed573, #7bed9f); }
        .mp-fill { background: linear-gradient(90deg, #0077ff, #00d2ff); }
        .enemy-hp-fill { background: linear-gradient(90deg, #ff3838, #ff6b6b); }

        .sub-text { font-size: 13px; color: var(--text-muted); margin-top: 2px; font-weight: 700; }

        /* SKILLE (ZDOLNOŚCI) */
        .skills-grid {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .skill-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
        }
        .skill-btn:hover:not(:disabled) {
            background: rgba(155, 81, 224, 0.15);
            border-color: var(--neon-purple);
        }
        .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* STATYSTYKI DETALE */
        .stats-book {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }
        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-badge {
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .stat-lbl { color: var(--text-muted); font-size: 15px; }
        .stat-val { font-weight: 700; color: var(--neon-cyan); }

        /* LOGI */
        #terminal-log {
            background: #04060c;
            border-radius: 8px;
            padding: 10px;
            height: 90px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            color: #a4b0be;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
        }

        /* SKLEP I INWENTARZ */
        #right-panel { flex: 1.2; }
        .tab-box { display: flex; background: rgba(0,0,0,0.4); }
        .tab-node {
            flex: 1;
            text-align: center;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }
        .tab-node.active-tab {
            color: #fff;
            border-bottom-color: var(--neon-cyan);
            background: rgba(255,255,255,0.02);
        }

        .market-list {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .market-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rarity-common { border-right: 4px solid var(--common); }
        .rarity-rare { border-right: 4px solid var(--rare); }
        .rarity-epic { border-right: 4px solid var(--epic); }
        .rarity-legendary { border-right: 4px solid var(--legendary); }

        /* ANIMACJE */
        .hit-effect { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .hero-dash { transform: translateX(40px) scale(1.05); }
        .enemy-dash { transform: translateX(-40px) scale(1.05); }

        .floating-dmg {
            position: absolute;
            top: -10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 26px;
            text-shadow: 0 0 8px #000;
            animation: floatUp 0.8s forwards;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>HABITQUEST // PRO</h1>
        </div>
        <div class="currency-container">
            <div class="currency-box gold">ZŁOTO: <span id="m-gold">0</span></div>
            <div class="currency-box gems">KRYSZTAŁY: <span id="m-gems">0</span></div>
        </div>
    </header>

    <div class="game-layout">

        <!-- LEWY PANEL -->
        <div class="glass-panel" id="left-panel">
            <div class="panel-title">Kreator Nawyków</div>
            <div class="creator-row">
                <input type="text" id="in-name" placeholder="Wpisz nowe zadanie lub nawyk...">
                <select id="in-type">
                    <option value="good">Dobry nawyk</option>
                    <option value="bad">Zły nawyk</option>
                </select>
                <button class="btn-action" onclick="addNewHabit()">+</button>
            </div>
            <div class="scrollable-list" id="habit-box"></div>
        </div>

        <!-- ŚRODKOWY PANEL -->
        <div class="glass-panel" id="center-panel">
            <div class="panel-title">
                <span>Strefa Starcia</span>
                <span id="enemy-title" style="color: var(--neon-red)">Łowca Myśli</span>
            </div>

            <div class="arena" id="battle-field">
                <!-- Bohater -->
                <div class="char-node">
                    <div class="circle-avatar" id="hero-avatar-node">🥷</div>
                    <div class="bar-wrap"><div class="bar-fill hp-fill" id="h-hp-bar"></div></div>
                    <div class="sub-text" id="h-hp-lbl">HP: 100/100</div>
                    <div class="bar-wrap" style="height:6px; margin-top:3px;"><div class="bar-fill mp-fill" id="h-mp-bar"></div></div>
                    <div class="sub-text" style="font-size:11px;" id="h-mp-lbl">MP: 20/20</div>
                    <div class="floating-dmg" id="h-dmg-pop" style="color: var(--neon-red);"></div>
                </div>

                <!-- Przeciwnik -->
                <div class="char-node">
                    <div class="circle-avatar" id="enemy-avatar-node">👾</div>
                    <div class="bar-wrap"><div class="bar-fill enemy-hp-fill" id="e-hp-bar"></div></div>
                    <div class="sub-text" id="e-hp-lbl">HP: 60/60</div>
                    <div class="floating-dmg" id="e-dmg-pop" style="color: var(--neon-gold);"></div>
                </div>
            </div>

            <!-- Panel Zdolności Aktywnych -->
            <div class="skills-grid">
                <button class="skill-btn" id="sk-1" onclick="useSpell('fire')">
                    <span style="color:var(--neon-purple); font-weight:700;">Płomień Skupienia</span>
                    <span style="font-size:12px; color:var(--text-muted);">Koszt: 10 MP | Zadaje dmg x2</span>
                </button>
                <button class="skill-btn" id="sk-2" onclick="useSpell('heal')">
                    <span style="color:var(--neon-cyan); font-weight:700;">Błogosławieństwo Odpoczynku</span>
                    <span style="font-size:12px; color:var(--text-muted);">Koszt: 15 MP | Leczy 40 HP</span>
                </button>
            </div>

            <!-- Statystyki Szczegółowe -->
            <div class="stats-book">
                <div class="bar-wrap" style="height:14px;"><div class="bar-fill" id="h-xp-bar" style="background: linear-gradient(90deg, #9b51e0, #00ffcc);"></div></div>
                <div class="sub-text" id="h-xp-lbl" style="text-align:center; margin-bottom:10px;">XP: 0 / 100 (Poziom 1)</div>

                <div class="grid-stats">
                    <div class="stat-badge"><span class="stat-lbl">Atak (ATK)</span><span class="stat-val" id="st-atk">10</span></div>
                    <div class="stat-badge"><span class="stat-lbl">Obrona (DEF)</span><span class="stat-val" id="st-def">2</span></div>
                    <div class="stat-badge"><span class="stat-lbl">Kryt (CRIT)</span><span class="stat-val" id="st-crit">10%</span></div>
                    <div class="stat-badge"><span class="stat-lbl">Zabójstwa</span><span class="stat-val" id="st-kills">0</span></div>
                </div>

                <div id="terminal-log"></div>
            </div>
        </div>

        <!-- PRAWY PANEL -->
        <div class="glass-panel" id="right-panel">
            <div class="tab-box">
                <div class="tab-node active-tab" id="t-shop" onclick="toggleTabs('shop')">Zbrojownia</div>
                <div class="tab-node" id="t-inv" onclick="toggleTabs('inv')">Ekwipunek</div>
            </div>
            <div class="market-list" id="shop-view"></div>
            <div class="market-list hidden" id="inv-view"></div>
        </div>

    </div>

    <script>
        // SYSTEM OPERACYJNY GRY
        let db = {
            level: 1, xp: 0, xpNeed: 100, gold: 80, gems: 2,
            hp: 120, maxHp: 120, mp: 30, maxMp: 30,
            baseAtk: 12, baseDef: 3, crit: 10, kills: 0,
            eHp: 60, eMaxHp: 60, eName: "Cień Prokrastynacji",
            habits: [
                { id: 1, name: "Poranny rozruch / Trening", type: "good", streak: 0 },
                { id: 2, name: "Przeglądanie TikToka bez celu", type: "bad", streak: 0 }
            ],
            ownedItems: []
        };

        const itemShop = [
            { id: 'w1', name: 'Katana Koncentracji', type: 'weapon', stat: 8, price: 50, rarity: 'rare', icon: '⚔️', desc: '+8 Ataku' },
            { id: 'w2', name: 'Rdzeń Hiper-Skupienia', type: 'weapon', stat: 22, price: 160, rarity: 'legendary', icon: '🔮', desc: '+22 Ataku' },
            { id: 'a1', name: 'Kurtka z Nano-Splotu', type: 'armor', stat: 5, price: 45, rarity: 'common', icon: '🧥', desc: '+5 Obrony' },
            { id: 'a2', name: 'Pancerz Niezłomnej Woli', type: 'armor', stat: 14, price: 130, rarity: 'epic', icon: '🛡️', desc: '+14 Obrony' }
        ];

        const monsters = ["Demon Rutyny", "Algorytm Zjadania Czasu", "Lord Słodkiego Lenia", "Cyborg Prokrastynator"];

        window.onload = () => {
            if(localStorage.getItem('hq_pro_save')) {
                db = JSON.parse(localStorage.getItem('hq_pro_save'));
            }
            refreshEngine();
        };

        function save() { localStorage.setItem('hq_pro_save', JSON.stringify(db)); }

        function refreshEngine() {
            // Waluty
            document.getElementById('m-gold').innerText = db.gold;
            document.getElementById('m-gems').innerText = db.gems;

            // Liczniki statystyk
            let eqAtk = getEqBonus('weapon');
            let eqDef = getEqBonus('armor');
            document.getElementById('st-atk').innerText = db.baseAtk + eqAtk;
            document.getElementById('st-def').innerText = db.baseDef + eqDef;
            document.getElementById('st-crit').innerText = db.crit + "%";
            document.getElementById('st-kills').innerText = db.kills;

            // Bary gracza
            document.getElementById('h-hp-lbl').innerText = `HP: ${db.hp}/${db.maxHp}`;
            document.getElementById('h-hp-bar').style.width = `${(db.hp / db.maxHp)*100}%`;
            document.getElementById('h-mp-lbl').innerText = `MP: ${db.mp}/${db.maxMp}`;
            document.getElementById('h-mp-bar').style.width = `${(db.mp / db.maxMp)*100}%`;
            
            // Bar XP
            document.getElementById('h-xp-lbl').innerText = `XP: ${db.xp} / ${db.xpNeed} (Poziom ${db.level})`;
            document.getElementById('h-xp-bar').style.width = `${(db.xp / db.xpNeed)*100}%`;

            // Przeciwnik
            document.getElementById('enemy-title').innerText = db.eName;
            document.getElementById('e-hp-lbl').innerText = `HP: ${db.eHp}/${db.eMaxHp}`;
            document.getElementById('e-hp-bar').style.width = `${(db.eHp / db.eMaxHp)*100}%`;

            // Przyciski skilli
            document.getElementById('sk-1').disabled = db.mp < 10;
            document.getElementById('sk-2').disabled = db.mp < 15;

            buildLists();
        }

        function buildLists() {
            // Buduj nawyki
            const hBox = document.getElementById('habit-box');
            hBox.innerHTML = '';
            db.habits.forEach(h => {
                const div = document.createElement('div');
                div.className = `habit-card ${h.type === 'bad' ? 'bad-habit' : ''}`;
                div.innerHTML = `
                    <div>
                        <div class="habit-name-tag">${h.name}</div>
                        <div class="habit-streak-tag">Seria sukcesów: ${h.streak || 0}</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${h.type === 'good' 
                            ? `<button class="circle-btn btn-good" onclick="hitHabit(${h.id}, true)">✓</button>`
                            : `<button class="circle-btn btn-bad" onclick="hitHabit(${h.id}, false)">✗</button>`
                        }
                        <button class="circle-btn btn-del" onclick="removeHabit(${h.id})">🗑</button>
                    </div>
                `;
                hBox.appendChild(div);
            });

            // Buduj Sklep
            const sBox = document.getElementById('shop-view');
            sBox.innerHTML = '';
            itemShop.forEach(item => {
                const div = document.createElement('div');
                div.className = `market-item rarity-${item.rarity}`;
                div.innerHTML = `
                    <div>
                        <div style="font-weight:bold; color:var(--neon-${item.rarity === 'legendary'?'gold':item.rarity === 'epic'?'purple':'cyan'})">${item.icon} ${item.name}</div>
                        <div style="font-size:13px; color:var(--text-muted)">${item.desc}</div>
                    </div>
                    <button class="btn-action" style="padding:6px 12px; font-size:13px;" onclick="buyItem('${item.id}')">${item.price} G</button>
                `;
                sBox.appendChild(div);
            });

            // Buduj Ekwipunek
            const iBox = document.getElementById('inv-view');
            iBox.innerHTML = '';
            if(db.ownedItems.length === 0) {
                iBox.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Ekwipunek jest pusty</div>`;
            }
            db.ownedItems.forEach(eq => {
                const div = document.createElement('div');
                div.className = `market-item rarity-${eq.rarity}`;
                div.innerHTML = `
                    <div>
                        <div style="font-weight:bold;">${eq.icon} ${eq.name} ${eq.active ? '<span style="color:var(--neon-cyan)">[Założony]</span>':''}</div>
                        <div style="font-size:13px; color:var(--text-muted)">${eq.desc}</div>
                    </div>
                    <button class="btn-action" style="padding:6px 12px; font-size:13px; background:${eq.active?'var(--neon-red)':'var(--neon-blue)'}" onclick="equipItem(${eq.instId})">
                        ${eq.active ? 'Zdejmij' : 'Załóż'}
                    </button>
                `;
                iBox.appendChild(div);
            });
        }

        // AKCJA NAWYKU
        function hitHabit(id, positive) {
            const h = db.habits.find(x => x.id === id);
            if(!h) return;

            if(positive) {
                h.streak++;
                let dmg = db.baseAtk + getEqBonus('weapon');
                
                // Szansa na kryta
                let isCrit = Math.random() * 100 < db.crit;
                if(isCrit) { dmg *= 2; }

                db.eHp -= dmg;
                db.gold += Math.floor(Math.random() * 6) + 4;
                db.mp = Math.min(db.maxMp, db.mp + 4); // Regeneracja many przy dobrym nawyku

                triggerVisual('hero-avatar-node', 'hero-dash');
                popDmg('e-dmg-pop', isCrit ? `🔥 ${dmg} CRIT!` : `-${dmg}`);
                writeLog(`Wykonano: "${h.name}". Zadajesz ${dmg} obrażeń wrogowi! (+Złoto, +Mana)`);

                if(db.eHp <= 0) { enemyDie(); }
            } else {
                h.streak = 0;
                let def = db.baseDef + getEqBonus('armor');
                let incoming = Math.max(6, 18 - def);
                
                db.hp -= incoming;
                triggerVisual('battle-field', 'hit-effect');
                popDmg('h-dmg-pop', `-${incoming}`);
                writeLog(`Złamanie dyscypliny: "${h.name}". Otrzymujesz ${incoming} obrażeń!`, true);

                if(db.hp <= 0) { playerDie(); }
            }
            save();
            refreshEngine();
        }

        // SPELL SYSTEM
        function useSpell(type) {
            if(type === 'fire' && db.mp >= 10) {
                db.mp -= 10;
                let dmg = (db.baseAtk + getEqBonus('weapon')) * 2;
                db.eHp -= dmg;
                popDmg('e-dmg-pop', `💥 ${dmg}`);
                writeLog(`Rzucasz Płomień Skupienia! Potężne uderzenie za ${dmg}!`);
                if(db.eHp <= 0) enemyDie();
            } else if(type === 'heal' && db.mp >= 15) {
                db.mp -= 15;
                db.hp = Math.min(db.maxHp, db.hp + 40);
                writeLog(`Używasz Błogosławieństwa Odpoczynku. Odnawiasz 40 punktów życia.`);
            }
            save();
            refreshEngine();
        }

        // ŚMIERĆ I AWANS
        function enemyDie() {
            db.kills++;
            let rewardXp = 35 + (db.level * 4);
            let rewardGold = 25 + (db.level * 8);
            db.xp += rewardXp;
            db.gold += rewardGold;

            // Szansa na kryształ (gem)
            if(Math.random() > 0.7) { db.gems += 1; writeLog("💎 Znalazłeś rzadki Kryształ we wraku potwora!"); }

            writeLog(`⚔️ Pokonałeś ${db.eName}! Zyskujesz +${rewardXp} XP oraz +${rewardGold} Złota.`);

            if(db.xp >= db.xpNeed) {
                db.level++;
                db.xp -= db.xpNeed;
                db.xpNeed = Math.floor(db.xpNeed * 1.45);
                db.maxHp += 15;
                db.maxMp += 5;
                db.hp = db.maxHp;
                db.mp = db.maxMp;
                db.baseAtk += 4;
                db.baseDef += 2;
                db.crit += 1;
                writeLog(`🌟 AWANS! Osiągasz Poziom ${db.level}! Twoje siły rosną.`, false);
            }

            db.eMaxHp = Math.floor(60 * Math.pow(1.25, db.level));
            db.eHp = db.eMaxHp;
            db.eName = monsters[Math.floor(Math.random() * monsters.length)] + ` V.${db.level}`;
        }

        function playerDie() {
            writeLog(`💀 Zostałeś unicestwiony przez swoje nawyki. Tracisz 40 sztuk złota. Zregeneruj siły!`, true);
            db.gold = Math.max(0, db.gold - 40);
            db.hp = db.maxHp;
            db.mp = db.maxMp;
        }

        // SKLEP I MANAGMENT EQ
        function buyItem(id) {
            const item = itemShop.find(x => x.id === id);
            if(db.gold >= item.price) {
                db.gold -= item.price;
                db.ownedItems.push({ ...item, active: false, instId: Date.now() });
                writeLog(`Kupiono: ${item.name}. Otwórz Ekwipunek, aby wyposażyć postać.`);
                save();
                refreshEngine();
            } else {
                alert("Niewystarczająca ilość złota! Wykonaj nawyki, aby zarobić.");
            }
        }

        function equipItem(instId) {
            const item = db.ownedItems.find(x => x.instId === instId);
            if(!item) return;

            if(item.active) {
                item.active = false;
            } else {
                db.ownedItems.forEach(x => { if(x.type === item.type) x.active = false; });
                item.active = true;
            }
            save();
            refreshEngine();
        }

        function getEqBonus(type) {
            let res = 0;
            db.ownedItems.forEach(x => { if(x.type === type && x.active) res += x.stat; });
            return res;
        }

        // POMOCNICZE WIZUALNE
        function addNewHabit() {
            const name = document.getElementById('in-name').value.trim();
            const type = document.getElementById('in-type').value;
            if(!name) return;
            db.habits.push({ id: Date.now(), name: name, type: type, streak: 0 });
            document.getElementById('in-name').value = '';
            save();
            refreshEngine();
        }

        function removeHabit(id) {
            db.habits = db.habits.filter(x => x.id !== id);
            save();
            refreshEngine();
        }

        function toggleTabs(mode) {
            if(mode === 'shop') {
                document.getElementById('t-shop').classList.add('active-tab');
                document.getElementById('t-inv').classList.remove('active-tab');
                document.getElementById('shop-view').classList.remove('hidden');
                document.getElementById('inv-view').classList.add('hidden');
            } else {
                document.getElementById('t-shop').classList.remove('active-tab');
                document.getElementById('t-inv').classList.add('active-tab');
                document.getElementById('shop-view').classList.add('hidden');
                document.getElementById('inv-view').classList.remove('hidden');
            }
        }

        function triggerVisual(id, className) {
            const el = document.getElementById(id);
            el.classList.add(className);
            setTimeout(() => el.classList.remove(className), 150);
        }

        function popDmg(id, text) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = null;
        }

        function writeLog(text, isBad = false) {
            const log = document.getElementById('terminal-log');
            const color = isBad ? 'var(--neon-red)' : '#00ffcc';
            log.innerHTML = `<span style="color:${color}">> ${text}</span><br>` + log.innerHTML;
        }
    </script>
</body>
</html>
