<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendarz - NeoRun</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #1a1a1a; padding: 15px; border-radius: 15px; }
        .day { aspect-ratio: 1; background: #222; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #444; }
        .day.active { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" style="color:white; text-decoration:none;">← POWRÓT</a>
    <h2 style="color:var(--neon)">TWOJA REGULARNOŚĆ</h2>
    <div class="calendar-grid" id="calendar"></div>
    <script>
        const history = JSON.parse(localStorage.getItem('neoHistory') || '[]');
        const runDays = history.map(r => parseInt(r.date.split('.')[0]));
        const cal = document.getElementById('calendar');
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = runDays.includes(i) ? 'day active' : 'day';
            d.innerText = i;
            cal.appendChild(d);
        }
    </script>
</body>
</html>
